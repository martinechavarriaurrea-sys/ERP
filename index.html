<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Personal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0c0f13;
      --bg1:#13181f;
      --bg2:#1a2028;
      --b1:#1e2830;
      --b2:#283340;
      --t1:#eef2f7;
      --t2:#8a9bb0;
      --t3:#4a5f75;
      --grn:#10d98a;
      --grn2:#0aaa6a;
      --gnbg:#071a11;
      --red:#f04060;
      --red2:#c02040;
      --rdbg:#1a080c;
      --amb:#f0a020;
      --amb2:#c07800;
      --ambg:#1a1005;
      --blu:#3080f0;
      --blbg:#050d1a;
      --pur:#9060f0;
      --purbg:#0d0518;
      --sidebar-w:230px;
      --top-h:64px;
      --r:14px;
    }
    * { box-sizing: border-box; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-track { background: var(--bg1); }
    *::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 10px; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--t1);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }
    .num, .money, .kpi-value, input[type="number"], .day-num, .amount-lg {
      font-family: 'IBM Plex Mono', monospace;
      font-variant-numeric: tabular-nums;
    }
    .app-shell {
      height: 100vh;
      width: 100%;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-w);
      border-right: 1px solid var(--b1);
      background: linear-gradient(180deg, #141a22 0%, #10151d 100%);
      display: flex;
      flex-direction: column;
      z-index: 20;
    }
    .logo {
      height: var(--top-h);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--b1);
      font-weight: 800;
      letter-spacing: .3px;
    }
    .logo-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--grn);
      box-shadow: 0 0 16px var(--grn);
    }
    .nav {
      padding: 12px 8px;
      overflow: auto;
      display: grid;
      gap: 4px;
    }
    .nav-item {
      border: 1px solid transparent;
      border-radius: 11px;
      color: var(--t2);
      background: transparent;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 11px;
      font-size: 14px;
      cursor: pointer;
      transition: .15s ease;
      font-family: inherit;
    }
    .nav-item:hover { background: var(--bg2); color: var(--t1); }
    .nav-item.active {
      background: #182028;
      border-color: var(--b2);
      color: var(--t1);
    }
    .nav-ico {
      width: 20px;
      text-align: center;
      font-size: 16px;
      flex: 0 0 20px;
    }
    .date-widget {
      margin-top: auto;
      border-top: 1px solid var(--b1);
      padding: 12px;
      color: var(--t2);
      font-size: 12px;
      line-height: 1.4;
    }
    .topbar {
      position: fixed;
      left: var(--sidebar-w);
      top: 0;
      right: 0;
      height: var(--top-h);
      border-bottom: 1px solid var(--b1);
      background: rgba(12, 15, 19, .94);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 19;
    }
    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .main {
      position: fixed;
      left: var(--sidebar-w);
      top: var(--top-h);
      right: 0;
      bottom: 0;
      overflow: auto;
      padding: 18px;
      background: radial-gradient(900px 400px at 80% -10%, #132030 0%, transparent 50%), var(--bg);
    }
    .panel {
      border: 1px solid var(--b1);
      background: linear-gradient(180deg, #171e27 0%, #141b24 100%);
      border-radius: var(--r);
      padding: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .muted { color: var(--t2); }
    .tiny { font-size: 12px; }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi {
      border-radius: 13px;
      padding: 14px;
      border: 1px solid var(--b1);
      background: var(--bg2);
      min-height: 100px;
    }
    .kpi-label { color: var(--t2); font-size: 12px; }
    .kpi-value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 600;
    }
    .kpi-sub { margin-top: 6px; font-size: 12px; color: var(--t2); }
    .kpi.grn { background: linear-gradient(180deg, #10251b, #0d1f17); border-color: #174d35; }
    .kpi.red { background: linear-gradient(180deg, #2a1218, #221015); border-color: #542230; }
    .kpi.blu { background: linear-gradient(180deg, #101e31, #0d1929); border-color: #213b60; }
    .kpi.amb { background: linear-gradient(180deg, #2a1f10, #22190e); border-color: #5c4119; }
    .btn {
      border: 1px solid var(--b2);
      color: var(--t1);
      background: #1a242f;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      transition: .16s;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.grn { background: linear-gradient(180deg, var(--grn), var(--grn2)); border-color: #0b8a56; color: #04190f; }
    .btn.red { background: linear-gradient(180deg, var(--red), var(--red2)); border-color: #851b30; }
    .btn.amb { background: linear-gradient(180deg, var(--amb), var(--amb2)); border-color: #8e5700; color: #241706; }
    .btn.blu { background: linear-gradient(180deg, var(--blu), #1f66cb); border-color: #17467f; }
    .btn.pur { background: linear-gradient(180deg, var(--pur), #6e45c1); border-color: #4a2d81; }
    .btn.ghost { background: transparent; }
    .btn.sm { padding: 7px 10px; border-radius: 8px; font-size: 12px; }
    .banner {
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: var(--bg2);
    }
    .banner.red { border-color: #4f1a24; background: var(--rdbg); }
    .banner.amb { border-color: #5d441a; background: var(--ambg); }
    .banner.blu { border-color: #1e3d63; background: var(--blbg); }
    .banner.grn { border-color: #1b4f37; background: var(--gnbg); }
    .section-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .item {
      border: 1px solid var(--b1);
      background: var(--bg2);
      border-radius: 10px;
      padding: 10px;
    }
    .progress {
      height: 8px;
      border-radius: 999px;
      background: #0f141b;
      border: 1px solid var(--b1);
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--amb), var(--grn));
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 740px;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--b1);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--t2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--b1);
      border-radius: 12px;
      background: #131920;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.grn { color: #73f0be; border-color: #206144; background: #0b2419; }
    .badge.red { color: #ff8ca2; border-color: #672534; background: #2a1118; }
    .badge.amb { color: #ffd18d; border-color: #6f4f1e; background: #2e220f; }
    .badge.blu { color: #94bbff; border-color: #2a4f83; background: #101d30; }
    .badge.pur { color: #c8afff; border-color: #4f3580; background: #1e1133; }
    .badge.gray { color: var(--t2); border-color: var(--b2); background: #182029; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--b2);
      background: #0f141b;
      color: var(--t1);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #3a4f67;
      box-shadow: 0 0 0 3px rgba(48, 128, 240, .15);
    }
    textarea { min-height: 84px; resize: vertical; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .form-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field > label {
      color: var(--t2);
      font-size: 12px;
      font-weight: 600;
    }
    .amount-lg {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: .4px;
    }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .type-btn {
      border: 1px solid var(--b2);
      background: #111820;
      color: var(--t2);
      border-radius: 11px;
      padding: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: .15s;
    }
    .type-btn.active { color: var(--t1); }
    .type-btn.ingreso.active { border-color: #216146; background: #10261b; }
    .type-btn.egreso.active { border-color: #6c2535; background: #261019; }
    .type-btn.pago_deuda.active { border-color: #7b5314; background: #2b1f0e; }
    .type-btn.por_cobrar.active { border-color: #285387; background: #102033; }
    .type-btn.capital.active { border-color: #4f357f; background: #1d1231; }
    .empty {
      border: 1px dashed var(--b2);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      background: #121820;
    }
    .empty .ico { font-size: 28px; margin-bottom: 8px; }
    .cards {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .account {
      border: 1px solid var(--b1);
      border-radius: 14px;
      background: linear-gradient(180deg, #18212b 0%, #141c24 100%);
      padding: 14px;
      display: grid;
      gap: 9px;
    }
    .small-list {
      border-top: 1px solid var(--b1);
      margin-top: 4px;
      padding-top: 8px;
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--t2);
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 12px;
    }
    .tab {
      border: 1px solid var(--b2);
      background: #10161d;
      color: var(--t2);
      padding: 7px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }
    .tab.active { color: var(--t1); border-color: #3d526a; background: #15212d; }
    .calendar {
      border: 1px solid var(--b1);
      border-radius: 12px;
      overflow: hidden;
      background: #111820;
    }
    .cal-head, .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }
    .cal-head div {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid var(--b1);
      border-right: 1px solid var(--b1);
      font-size: 12px;
      color: var(--t2);
      font-weight: 700;
      text-transform: uppercase;
    }
    .cal-head div:last-child { border-right: 0; }
    .day {
      min-height: 92px;
      border-right: 1px solid var(--b1);
      border-bottom: 1px solid var(--b1);
      padding: 7px;
      display: grid;
      align-content: start;
      gap: 4px;
      background: #121922;
    }
    .day:nth-child(7n) { border-right: 0; }
    .day.today {
      outline: 1px solid var(--grn);
      outline-offset: -1px;
      background: #122218;
    }
    .day.blank { background: #0f141b; }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blu);
      margin-top: 2px;
    }
    .pl-layout {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 12px;
    }
    .pl-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px dashed #25303c;
      font-size: 13px;
    }
    .pl-line.bold {
      font-weight: 800;
      border-bottom-style: solid;
      padding-top: 9px;
    }
    .result-box {
      margin-top: 10px;
      border: 1px solid var(--b2);
      border-radius: 12px;
      padding: 12px;
      background: #111922;
    }
    .bar-list {
      display: grid;
      gap: 8px;
    }
    .bar-row {
      display: grid;
      gap: 4px;
    }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid var(--b1);
      background: #0c1219;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }
    .proj {
      display: grid;
      gap: 12px;
    }
    .proj-section {
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 12px;
      background: #131a23;
    }
    .hbars { display: grid; gap: 6px; }
    .hbar {
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    .hbar-track {
      height: 12px;
      border-radius: 999px;
      background: #0e141b;
      border: 1px solid var(--b1);
      overflow: hidden;
    }
    .hbar-fill { height: 100%; border-radius: inherit; }
    .milestones {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .setup {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: radial-gradient(900px 500px at 85% -20%, #19314b 0%, transparent 55%), var(--bg);
    }
    .setup-card {
      width: min(540px, 100%);
      border: 1px solid var(--b1);
      border-radius: 18px;
      background: linear-gradient(180deg, #18212c 0%, #131a23 100%);
      padding: 20px;
      display: grid;
      gap: 12px;
    }
    #toastZone {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: grid;
      gap: 8px;
      z-index: 60;
    }
    .toast {
      border: 1px solid var(--b2);
      background: #15202b;
      color: var(--t1);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 220px;
      animation: pop .2s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
      font-size: 13px;
    }
    .toast.ok { border-color: #216146; background: #0f2219; }
    .toast.err { border-color: #6f2736; background: #281018; }
    .toast.warn { border-color: #72511d; background: #281d0d; }
    @keyframes pop {
      from { transform: translateY(6px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
      padding: 16px;
    }
    #modalOverlay.show { display: flex; }
    .modal-card {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 14px;
      border: 1px solid var(--b1);
      background: #141b24;
    }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--b1);
      background: #161f2a;
    }
    .modal-head h3 { margin: 0; font-size: 16px; }
    .modal-body { padding: 14px; }
    .xbtn {
      border: 1px solid var(--b2);
      background: #1a242f;
      color: var(--t1);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .hidden { display: none !important; }
    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .cards { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .pl-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      :root { --sidebar-w:56px; }
      .logo span:not(.logo-dot), .nav-label, .date-widget .txt { display: none; }
      .logo { justify-content: center; padding: 0; }
      .nav-item { justify-content: center; padding: 10px 0; }
      .date-widget { text-align: center; padding: 10px 4px; }
      .main { padding: 12px; }
      .type-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 640px) {
      .grid-4, .grid-3, .cards { grid-template-columns: 1fr; }
      .topbar { padding: 0 10px; }
      .title { font-size: 16px; }
      .btn { padding: 9px 10px; }
      .hbar { grid-template-columns: 58px 1fr auto; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toastZone"></div>
  <div id="modalOverlay">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button id="modalClose" class="xbtn" type="button">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'erp_v1';
    const AUTH_SESSION_KEY = `${STORAGE_KEY}_auth_user_id`;
    const LEGACY_GLOBAL_KEY = STORAGE_KEY;

    const ACCESS_USERS = [
      { id: 'u1', nombre: 'MARTIN', secuencia: '1017924435' },
      { id: 'u2', nombre: 'David', secuencia: '1234' }
    ];
    const USER_BOOTSTRAP_VERSION = 'martin_20260428';

          { id: 2, tipo: 'capital', monto: 22329, concepto: 'Ahorro propio Lulo Bank', cat: 'Lulo Bank', dest: '', fecha: '2026-04-01', notas: 'Ahorro personal separado' },

          { id: 4, tipo: 'ingreso', monto: 804000, concepto: 'Quincena 30 marzo', cat: 'Salario', dest: 'Bancolombia', fecha: '2026-03-30', notas: 'Quincena marzo' },
          { id: 5, tipo: 'egreso', monto: 400000, concepto: 'Transporte viaje semana', cat: 'Transporte', dest: 'Efectivo', fecha: '2026-04-15', notas: 'Viaje semana' },
          { id: 6, tipo: 'egreso', monto: 350000, concepto: 'Alimentación viaje semana', cat: 'Alimentación', dest: 'Efectivo', fecha: '2026-04-15', notas: 'Viaje semana' },

          mov.pago_tipo = String(mov.pago_tipo || m?.dest || 'Cuota regular');
          const did = mov.deuda_id !== undefined && mov.deuda_id !== null ? String(mov.deuda_id) : '';
          mov.deuda_id = debtIds.has(did) ? did : '';
        }
        return mov;
      }).filter(m => n(m.monto) > 0);

      out.cobrar = out.cobrar.map((c, idx) => ({
        ...c,
        id: toStrId(c?.id || `cob_${idx + 1}`, 'cob'),
        deudor: String(c?.deudor || ''),
        monto: n(c?.monto),
        fecha_vencimiento: String(c?.fecha_vencimiento || c?.fecha || todayISO()),
        estado: normalizeEstadoCobrar(c?.estado),
        notas: String(c?.notas || ''),
        cuenta_id: c?.cuenta_id ? String(c.cuenta_id) : '',
        fecha_cobro: c?.fecha_cobro ? String(c.fecha_cobro) : '',
        movimiento_id: c?.movimiento_id ? String(c.movimiento_id) : ''
      }));

      const snap = {};
      Object.entries(out.mes_inicio || {}).forEach(([mk, row]) => {
        if (!row || typeof row !== 'object') return;
        const fixed = {};
        Object.entries(row).forEach(([k, v]) => {
          const key = String(k);
          if (debtIds.has(key)) fixed[key] = n(v);
        });
        if (Object.keys(fixed).length) snap[mk] = fixed;
      });
      out.mes_inicio = snap;
      return out;
    }

    function userStorageKey(userId) {
      return `${STORAGE_KEY}_${userId}`;
    }

    function loadState(userId = getAuthUserId()) {
      if (!userId) return emptyState();
      const userKey = userStorageKey(userId);
      let raw = localStorage.getItem(userKey);
      if (!raw) {
        const legacy = localStorage.getItem(LEGACY_GLOBAL_KEY);
        const migrated = localStorage.getItem(LEGACY_MIGRATION_KEY);
        if (legacy && !migrated) {
          localStorage.setItem(userKey, legacy);
          localStorage.setItem(LEGACY_MIGRATION_KEY, '1');
          raw = legacy;
        }
      }
      if (!raw) return emptyState();
      try {
        const parsed = JSON.parse(raw);
        return normalizeState(parsed);
      } catch {
        return emptyState();
      }
    }

    function maybeBootstrapCurrentUser() {
      const userId = getAuthUserId();
      if (!userId) return false;
      const payload = USER_BOOTSTRAP_PAYLOADS[userId];
      if (!payload) return false;
      const markerKey = `${userStorageKey(userId)}_bootstrap_${USER_BOOTSTRAP_VERSION}`;
      if (localStorage.getItem(markerKey)) return false;
      state = normalizeState(payload);
      state.config.nombre = getAuthUser() || state.config.nombre;
      loadedUserId = userId;
      persist();
      localStorage.setItem(markerKey, '1');
      ui.route = 'dashboard';
      return true;
    }

    function persist() {
      const userId = getAuthUserId();
      if (!userId) return;
      localStorage.setItem(userStorageKey(userId), JSON.stringify(state));
      lastSaveAt = new Date().toISOString();
    }

    function resetAllData() {
      const userId = getAuthUserId();
      if (userId) localStorage.removeItem(userStorageKey(userId));
      state = emptyState();
      lastSaveAt = null;
      ui.route = 'dashboard';
      ui.acumuladoResult = null;
      render();
    }

    function uid() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function n(v) {
      const num = Number(v);
      return Number.isFinite(num) ? num : 0;
    }

    const moneyFormatter = new Intl.NumberFormat('es-CO', {
      style: 'currency',
      currency: 'COP',
      maximumFractionDigits: 0
    });

    function money(v) {
      return moneyFormatter.format(n(v));
    }

    function pad(v) {
      return String(v).padStart(2, '0');
    }

    function todayISO() {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function currentMonthKey() {
      return todayISO().slice(0, 7);
    }

    function monthKeyFrom(year, month) {
      return `${year}-${pad(month)}`;
    }

    function fmtDate(iso) {
      if (!iso || typeof iso !== 'string' || !iso.includes('-')) return '-';
      const parts = iso.slice(0, 10).split('-');
      if (parts.length !== 3) return '-';
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function monthName(key) {
      const m = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      const [y, mo] = key.split('-').map(Number);
      if (!y || !mo) return key;
      return `${m[mo - 1]} ${y}`;
    }

    function shiftMonthKey(key, delta) {
      const [y, m] = key.split('-').map(Number);
      const d = new Date(y, (m - 1) + delta, 1);
      return monthKeyFrom(d.getFullYear(), d.getMonth() + 1);
    }

    function parseDateISO(iso) {
      if (!iso) return null;
      const [y, m, d] = iso.split('-').map(Number);
      if (!y || !m || !d) return null;
      return new Date(y, m - 1, d);
    }

    function daysBetween(fromISO, toISO) {
      const a = parseDateISO(fromISO);
      const b = parseDateISO(toISO);
      if (!a || !b) return 0;
      const ms = b.setHours(0,0,0,0) - a.setHours(0,0,0,0);
      return Math.round(ms / 86400000);
    }

    function showToast(msg, kind = 'ok') {
      const div = document.createElement('div');
      div.className = `toast ${kind}`;
      div.textContent = msg;
      toastZone.appendChild(div);
      setTimeout(() => {
        div.style.opacity = '0';
        div.style.transform = 'translateY(8px)';
        setTimeout(() => div.remove(), 180);
      }, 2500);
    }

    function openModal(title, html) {
      modalTitle.textContent = title;
      modalBody.innerHTML = html;
      modalOverlay.classList.add('show');
      const first = modalBody.querySelector('input,select,textarea,button');
      if (first) first.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('show');
      modalBody.innerHTML = '';
    }

    function isSetupRequired() {
      return !state.config || !String(state.config.nombre || '').trim();
    }

    function getAuthUserId() {
      const raw = String(sessionStorage.getItem(AUTH_SESSION_KEY) || '');
      if (!raw) return '';
      const byId = ACCESS_USERS.find(u => u.id === raw);
      if (byId) return byId.id;
      const byName = ACCESS_USERS.find(u => u.nombre === raw);
      if (byName) {
        sessionStorage.setItem(AUTH_SESSION_KEY, byName.id);
        return byName.id;
      }
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      return '';
    }

    function getAuthUser() {
      const id = getAuthUserId();
      return ACCESS_USERS.find(u => u.id === id)?.nombre || '';
    }

    function isAuthenticated() {
      return !!getAuthUser();
    }

      app.innerHTML = `
        <div class="setup">
          <form class="setup-card" id="accessForm">
            <h2 style="margin:0">Acceso</h2>

    function movementsByMonth(monthKey) {
      return state.movimientos.filter(m => String(m.fecha || '').startsWith(monthKey));
    }

    function movementIncome(m) {
      return (m.tipo === 'ingreso' || m.tipo === 'capital') ? n(m.monto) : 0;
    }

    function movementExpense(m) {
      return (m.tipo === 'egreso' || m.tipo === 'pago_deuda') ? n(m.monto) : 0;
    }

    function getDebtPaid(deudaId) {
      return state.movimientos
        .filter(m => m.tipo === 'pago_deuda' && m.deuda_id === deudaId)
        .reduce((s, m) => s + n(m.monto), 0);
    }

    function getDebtBalance(deuda) {
      return Math.max(0, n(deuda.saldo_inicial) - getDebtPaid(deuda.id));
    }

    function getAccountFlowAmount(m) {
      if (!m || !m.cuenta_id) return 0;
      if (m.tipo === 'ingreso' || m.tipo === 'capital') return n(m.monto);
      if (m.tipo === 'egreso' || m.tipo === 'pago_deuda') return -n(m.monto);
      return 0;
    }

    function getAccountMovements(cuentaId) {
      return state.movimientos.filter(m => m.cuenta_id === cuentaId);
    }

    function getAccountInflows(cuentaId) {
      return getAccountMovements(cuentaId).reduce((s, m) => {
        const v = getAccountFlowAmount(m);
        return v > 0 ? s + v : s;
      }, 0);
    }

    function getAccountOutflows(cuentaId) {
      return getAccountMovements(cuentaId).reduce((s, m) => {
        const v = getAccountFlowAmount(m);
        return v < 0 ? s + Math.abs(v) : s;
      }, 0);
    }

    function getAccountSummary(cuenta) {
      const inflows = getAccountInflows(cuenta.id);
      const outflows = getAccountOutflows(cuenta.id);
      const start = n(cuenta.saldo_inicial);
      return {
        inicio: start,
        ingresos: inflows,
        egresos: outflows,
        saldo: start + inflows - outflows
      };
    }

    function getAccountName(cuentaId) {
      if (!cuentaId) return '-';
      return state.cuentas.find(c => c.id === cuentaId)?.nombre || 'Cuenta eliminada';
    }

    function getAccountBalance(cuenta) {
      return getAccountSummary(cuenta).saldo;
    }

    function totalAccountsBalance() {
      return state.cuentas.reduce((s, c) => s + getAccountBalance(c), 0);
    }

    function ensureMonthSnapshot(monthKey = currentMonthKey()) {
      if (!state.mes_inicio[monthKey]) {
        const snap = {};
        state.deudas.forEach(d => {
          snap[d.id] = getDebtBalance(d);
        });
        state.mes_inicio[monthKey] = snap;
        persist();
      }
    }

    function debtReductionThisMonth(deuda, monthKey = currentMonthKey()) {
      const snapMonth = state.mes_inicio[monthKey] || {};
      const start = n(snapMonth[deuda.id]);
      const current = getDebtBalance(deuda);
      if (!start) return 0;
      return start - current;
    }

    function totalDebtNow() {
      return state.deudas.reduce((s, d) => s + getDebtBalance(d), 0);
    }

    function statusCobrar(item) {
      if (item.estado === 'Cobrado') return 'Cobrado';
      const due = item.fecha_vencimiento;
      if (due && due < todayISO()) return 'Vencido';
      return 'Pendiente';
    }

    function sortByDateDesc(list) {
      return [...list].sort((a, b) => String(b.fecha || '').localeCompare(String(a.fecha || '')) || String(b.id || '').localeCompare(String(a.id || '')));
    }

    function sortByDateAsc(list) {
      return [...list].sort((a, b) => String(a.fecha || '').localeCompare(String(b.fecha || '')) || String(a.id || '').localeCompare(String(b.id || '')));
    }

    function routeLabel(routeId) {

    function typeBadge(tipo) {
      const meta = TYPE_META[tipo] || { label: tipo, badge: 'gray' };
      return `<span class="badge ${meta.badge}">${escapeHtml(meta.label)}</span>`;

    function emptyBlock(icon, text, actionLabel = '', action = '') {

    function accountOptions(selectedId = '') {

    function debtOptions(selectedId = '') {

        .map(d => `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${escapeHtml(d.acreedor)} · ${money(getDebtBalance(d))}</option>`)

    }

    function incomeCategoryOptions(selected = '') {

    }

    function expenseCategoryOptions(selected = '') {

    }

    function debtPayTypeOptions(selected = '') {
      return DEBT_PAY_TYPES.map(c => `<option value="${escapeHtml(c)}" ${c === selected ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('');
    }

    function monthlyRateEA(tasaEA) {
      return Math.pow(1 + n(tasaEA) / 100, 1 / 12) - 1;
    }

    function dashboardContent() {
      const monthKey = currentMonthKey();
      const monthMoves = movementsByMonth(monthKey);
      const ingresosMes = monthMoves.reduce((s, m) => s + movementIncome(m), 0);
      const egresosMes = monthMoves.reduce((s, m) => s + movementExpense(m), 0);
      const saldoNeto = ingresosMes - egresosMes;
      const deudaActual = totalDebtNow();
      const deudaInicial = n(state.config.deuda_inicial_total);
      const deudaPct = deudaInicial > 0 ? (deudaActual / deudaInicial) * 100 : 0;

      const debts = state.deudas
        .slice()
        .sort((a, b) => n(b.tasa_ea) - n(a.tasa_ea))
        .map(d => {
          const current = getDebtBalance(d);
          const start = n(d.saldo_inicial);
          const paidPct = start > 0 ? Math.max(0, Math.min(100, ((start - current) / start) * 100)) : 0;
          const redMes = debtReductionThisMonth(d, monthKey);
          return `
            <div class="item">
              <div class="row">
                <strong>${escapeHtml(d.acreedor)}</strong>
                <span class="money num">${money(current)}</span>
              </div>
              <div style="margin:8px 0 6px" class="progress"><span style="width:${paidPct}%"></span></div>
              <div class="tiny muted">Reducción este mes: <span class="num" style="color:${redMes >= 0 ? 'var(--grn)' : 'var(--red)'}">${money(redMes)}</span></div>
            </div>
          `;
        }).join('');

      const last5 = sortByDateDesc(state.movimientos).slice(0, 5);
      const next3 = state.cobrar
        .filter(c => statusCobrar(c) !== 'Cobrado')
        .sort((a, b) => String(a.fecha_vencimiento || '').localeCompare(String(b.fecha_vencimiento || '')))
        .slice(0, 3);

      const isMonday = new Date().getDay() === 1;
      const reduccionMesTotal = state.deudas.reduce((s, d) => s + debtReductionThisMonth(d, monthKey), 0);
      const nextCobro = next3[0];

      return `
        ${isMonday ? `
          <div class="banner grn">
            <strong>Lunes financiero</strong>
            <div class="tiny" style="margin-top:6px">
              Deuda total: <span class="num">${money(deudaActual)}</span> ·
              Reducción del mes: <span class="num">${money(reduccionMesTotal)}</span> ·
              Próximo cobro: <span class="num">${nextCobro ? `${escapeHtml(nextCobro.deudor)} (${fmtDate(nextCobro.fecha_vencimiento)})` : 'Sin cobros'}</span> ·
              Saldo cuentas: <span class="num">${money(totalAccountsBalance())}</span>
            </div>
          </div>
        ` : ''}

        <div class="grid-4">
          <div class="kpi grn">
            <div class="kpi-label">Ingresos del mes</div>
            <div class="kpi-value num">${money(ingresosMes)}</div>
          </div>
          <div class="kpi red">
            <div class="kpi-label">Egresos del mes</div>
            <div class="kpi-value num">${money(egresosMes)}</div>
          </div>
          <div class="kpi ${saldoNeto >= 0 ? 'blu' : 'red'}">
            <div class="kpi-label">Saldo neto</div>
            <div class="kpi-value num">${money(saldoNeto)}</div>
          </div>
          <div class="kpi amb">
            <div class="kpi-label">Deuda total</div>
            <div class="kpi-value num">${money(deudaActual)}</div>
            <div class="kpi-sub">${deudaInicial > 0 ? `${deudaPct.toFixed(1)}% de ${money(deudaInicial)}` : 'Sin deuda inicial configurada'}</div>
          </div>
        </div>

        <div class="grid-3" style="margin-top:12px">
          <section class="panel">
            <h3 class="section-title">Deudas</h3>
            ${state.deudas.length ? `<div class="list">${debts}</div>` : emptyBlock('↗', 'No tienes deudas registradas', 'Agregar deuda', 'go-pagar')}
          </section>

          <section class="panel">
            <h3 class="section-title">Últimos 5 movimientos</h3>
            ${last5.length ? `
              <div class="list">
                ${last5.map(m => `
                  <div class="item">
                    <div class="row">
                      ${typeBadge(m.tipo)}
                      <span class="tiny muted">${fmtDate(m.fecha)}</span>
                    </div>
                    <div style="margin-top:4px">${escapeHtml(m.concepto || '-')}</div>
                    <div class="row" style="margin-top:4px">
                      <span class="tiny muted">${escapeHtml(m.categoria || '-')}</span>
                      <span class="money num" style="color:${movementIncome(m) > 0 ? 'var(--grn)' : movementExpense(m) > 0 ? 'var(--red)' : 'var(--t1)'}">${money(n(m.monto))}</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : emptyBlock('＋', 'Aún no hay movimientos', 'Registrar movimiento', 'go-registrar')}
          </section>

          <section class="panel">
            <h3 class="section-title">Próximos cobros</h3>
            ${next3.length ? `
              <div class="list">
                ${next3.map(c => `
                  <div class="item">
                    <div class="row">

                    </div>

                  </div>
                `).join('')}
              </div>
            ` : emptyBlock('↙', 'No hay cobros pendientes', 'Agregar por cobrar', 'go-cobrar')}

      return `

                      <td>${escapeHtml(m.categoria || '-')}</td>

                      <td>${escapeHtml(m.notas || '-')}</td>
                      <td>
                        <div class="actions">
                          <button class="btn sm ghost" type="button" data-action="edit-mov" data-id="${m.id}">✎</button>

    function cuentasContent() {

      const consolidatedRows = state.cuentas.map(c => ({ cuenta: c, sum: getAccountSummary(c) }));

    function cobrarContent() {
      const items = state.cobrar.slice();
      const pendingTotal = items.filter(i => statusCobrar(i) !== 'Cobrado').reduce((s, i) => s + n(i.monto), 0);
      const doneTotal = items.filter(i => statusCobrar(i) === 'Cobrado').reduce((s, i) => s + n(i.monto), 0);
      const nextDue = items
        .filter(i => statusCobrar(i) !== 'Cobrado')
        .sort((a, b) => String(a.fecha_vencimiento || '').localeCompare(String(b.fecha_vencimiento || '')))[0];

      const filtered = items.filter(i => {
        const s = statusCobrar(i);
        if (ui.cobrarFilter === 'Todos') return true;
        if (ui.cobrarFilter === 'Pendientes') return s === 'Pendiente';
        if (ui.cobrarFilter === 'Cobrados') return s === 'Cobrado';
        if (ui.cobrarFilter === 'Vencidos') return s === 'Vencido';

      }).sort((a, b) => String(a.fecha_vencimiento || '').localeCompare(String(b.fecha_vencimiento || '')));

          <div class="kpi blu"><div class="kpi-label">Total cobrado</div><div class="kpi-value num">${money(doneTotal)}</div></div>
          <div class="kpi"><div class="kpi-label">Próximo vencimiento</div><div class="kpi-value num" style="font-size:19px">${nextDue ? fmtDate(nextDue.fecha_vencimiento) : '-'}</div></div>
        </div>

        <div class="row" style="margin-bottom:10px">
          <div class="tabs" style="margin:0">
            ${['Todos', 'Pendientes', 'Cobrados', 'Vencidos'].map(t => `<button class="tab ${ui.cobrarFilter === t ? 'active' : ''}" data-action="cobrar-filter" data-filter="${t}">${t}</button>`).join('')}

        ${items.length ? `

              <tbody>
                ${filtered.map(i => {

                    <tr>
                      <td>${escapeHtml(i.deudor)}</td>
                      <td>${escapeHtml(i.notas || '-')}</td>
                      <td class="num" style="color:var(--grn)">${money(i.monto)}</td>
                      <td>${fmtDate(i.fecha_vencimiento)}</td>
                      <td class="num" style="color:${days < 0 ? 'var(--red)' : 'var(--t1)'}">${days < 0 ? `Vencido ${Math.abs(days)}d` : `${days}d`}</td>
                      <td><span class="badge ${badge}">${st}</span></td>

      const totalDeuda = sorted.reduce((s, d) => s + getDebtBalance(d), 0);
      const interesMes = sorted.reduce((s, d) => s + getDebtBalance(d) * monthlyRateEA(d.tasa_ea), 0);

          <div class="kpi amb"><div class="kpi-label">Interés mensual estimado</div><div class="kpi-value num">${money(interesMes)}</div></div>

                    <tr>
                      <td>${escapeHtml(d.acreedor)}</td>

                          <button class="btn sm ghost" data-action="edit-debt" data-id="${d.id}">Editar</button>

            </table>

        ` : emptyBlock('↗', 'No hay deudas registradas', 'Agregar deuda', 'new-debt')}
      `;
    }

    function flujoContent() {
      const monthKey = ui.flujoMonth;
      const [yy, mm] = monthKey.split('-').map(Number);
      const rows = sortByDateAsc(movementsByMonth(monthKey));
      const entradas = rows.reduce((s, m) => s + movementIncome(m), 0);
      const salidas = rows.reduce((s, m) => s + movementExpense(m), 0);
      const balance = entradas - salidas;

      const first = new Date(yy, mm - 1, 1);
      const start = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const daysInMonth = new Date(yy, mm, 0).getDate();
      const cells = [];
      for (let i = 0; i < start; i++) cells.push('<div class="day blank"></div>');
      for (let day = 1; day <= daysInMonth; day++) {
        const iso = `${yy}-${pad(mm)}-${pad(day)}`;
        const dayMoves = rows.filter(m => m.fecha === iso);
        const inc = dayMoves.reduce((s, m) => s + movementIncome(m), 0);
        const exp = dayMoves.reduce((s, m) => s + movementExpense(m), 0);
        const isToday = iso === todayISO();
        cells.push(`
          <div class="day ${isToday ? 'today' : ''}">
            <div class="day-num num">${day}</div>
            ${inc > 0 ? `<div class="tiny" style="color:var(--grn)">${money(inc)}</div>` : ''}
            ${exp > 0 ? `<div class="tiny" style="color:var(--red)">${money(exp)}</div>` : ''}
            ${dayMoves.length ? '<div class="dot"></div>' : ''}
          </div>
        `);
      }
      while (cells.length % 7 !== 0) cells.push('<div class="day blank"></div>');

      let run = 0;
      const tableRows = rows.map(m => {
        const en = movementIncome(m);
        const sa = movementExpense(m);
        run += en - sa;
        return `
          <tr>
            <td>${fmtDate(m.fecha)}</td>
            <td>${escapeHtml(m.concepto || '-')}</td>
            <td>${typeBadge(m.tipo)}</td>
            <td class="num" style="color:var(--grn)">${en ? money(en) : '-'}</td>
            <td class="num" style="color:var(--red)">${sa ? money(sa) : '-'}</td>
            <td class="num">${money(run)}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="grid-3" style="margin-bottom:12px">
          <div class="kpi grn"><div class="kpi-label">Entradas mes</div><div class="kpi-value num">${money(entradas)}</div></div>
          <div class="kpi red"><div class="kpi-label">Salidas mes</div><div class="kpi-value num">${money(salidas)}</div></div>
          <div class="kpi blu"><div class="kpi-label">Balance</div><div class="kpi-value num">${money(balance)}</div></div>
        </div>

        <div class="row" style="margin-bottom:10px">
          <div class="actions">
            <button class="btn sm ghost" data-action="flujo-prev">◀</button>
            <strong>${monthName(monthKey)}</strong>
            <button class="btn sm ghost" data-action="flujo-next">▶</button>
          </div>
        </div>

        <div class="calendar">
          <div class="cal-head">
            <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
          </div>
          <div class="cal-grid">${cells.join('')}</div>
        </div>

        <section class="panel" style="margin-top:12px">
          <h3 class="section-title">Movimientos del mes</h3>
          ${rows.length ? `
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Fecha</th><th>Concepto</th><th>Tipo</th><th>Entrada</th><th>Salida</th><th>Saldo acumulado</th></tr>
                </thead>
                <tbody>
                  ${tableRows}
                  <tr>
                    <td colspan="3"><strong>Total</strong></td>
                    <td class="num" style="color:var(--grn)"><strong>${money(entradas)}</strong></td>
                    <td class="num" style="color:var(--red)"><strong>${money(salidas)}</strong></td>
                    <td class="num"><strong>${money(balance)}</strong></td>
                  </tr>
                </tbody>
              </table>
            </div>
          ` : emptyBlock('≋', 'No hay movimientos este mes', 'Registrar movimiento', 'go-registrar')}
        </section>
      `;
    }

    function monthPL(monthKey) {
      const moves = movementsByMonth(monthKey);
      const ingresos = {};
      const egresos = {};
      const deudas = {};
      let capital = 0;

      moves.forEach(m => {
        if (m.tipo === 'ingreso') ingresos[m.categoria || 'Otros'] = (ingresos[m.categoria || 'Otros'] || 0) + n(m.monto);
        if (m.tipo === 'capital') capital += n(m.monto);
        if (m.tipo === 'egreso') egresos[m.categoria || 'Otros'] = (egresos[m.categoria || 'Otros'] || 0) + n(m.monto);
        if (m.tipo === 'pago_deuda') {
          const name = state.deudas.find(d => d.id === m.deuda_id)?.acreedor || m.categoria || 'Deuda';
          deudas[name] = (deudas[name] || 0) + n(m.monto);
        }
      });

      const subIng = Object.values(ingresos).reduce((s, v) => s + v, 0);
      const subEgr = Object.values(egresos).reduce((s, v) => s + v, 0);
      const subDeu = Object.values(deudas).reduce((s, v) => s + v, 0);
      const totalIng = subIng + capital;
      const totalEgr = subEgr + subDeu;
      const res = totalIng - totalEgr;
      return { ingresos, egresos, deudas, subIng, capital, totalIng, subEgr, subDeu, totalEgr, res };
    }

    function estadoContent() {
      const monthKey = monthKeyFrom(ui.estadoYear, ui.estadoMonth);
      const pl = monthPL(monthKey);
      const margin = pl.totalIng > 0 ? (pl.res / pl.totalIng) * 100 : 0;

      const years = new Set([new Date().getFullYear()]);
      state.movimientos.forEach(m => { if (m.fecha) years.add(Number(m.fecha.slice(0, 4))); });
      const yearOptions = [...years].sort((a, b) => b - a).map(y => `<option value="${y}" ${ui.estadoYear === y ? 'selected' : ''}>${y}</option>`).join('');

      const ingTot = Object.values(pl.ingresos).reduce((s, v) => s + v, 0);
      const egrTot = Object.values(pl.egresos).reduce((s, v) => s + v, 0);

      const comp = [];
      for (let i = 5; i >= 0; i--) {
        const mk = shiftMonthKey(monthKey, -i);
        const data = monthPL(mk);
        comp.push({ mk, ing: data.totalIng, egr: data.totalEgr, res: data.res });
      }

      return `
        <div class="row" style="margin-bottom:10px">
          <div class="actions">
            <select id="estadoMonthSel">${Array.from({ length: 12 }, (_, i) => `<option value="${i + 1}" ${ui.estadoMonth === i + 1 ? 'selected' : ''}>${i + 1}</option>`).join('')}</select>
            <select id="estadoYearSel">${yearOptions}</select>
          </div>
          <strong>${monthName(monthKey)}</strong>
        </div>

        <div class="pl-layout">
          <section class="panel">
            <h3 class="section-title">Estado de resultados</h3>
            <div class="pl-line"><span>INGRESOS</span><span></span></div>
            ${Object.entries(pl.ingresos).map(([k, v]) => `<div class="pl-line"><span>${escapeHtml(k)}</span><span class="num">${money(v)}</span></div>`).join('') || '<div class="pl-line"><span class="muted">Sin ingresos</span><span>-</span></div>'}
            <div class="pl-line"><span>Subtotal ingresos</span><span class="num">${money(pl.subIng)}</span></div>

    function projectionSimulation() {
      const p = state.proyeccion || {};
      const ingreso = n(p.ingreso_mensual || state.config.ingreso_mensual);
      const disponible = n(p.disponible_deuda);
      const gasto = n(p.gasto_fijo_mensual);
      const ahorro = n(p.ahorro_mensual);
      const inversion = n(p.inversion_mensual);

      const labels = [];
      let mk = currentMonthKey();
      for (let i = 0; i < 12; i++) {
        labels.push(mk);
        mk = shiftMonthKey(mk, 1);
      }

      const debtList = state.deudas
        .slice()
        .sort((a, b) => n(b.tasa_ea) - n(a.tasa_ea))
        .map(d => ({ id: d.id, name: d.acreedor, cuota: n(d.cuota), tasa: n(d.tasa_ea), saldo: getDebtBalance(d), zeroAt: null }));

      const debtSeries = [];
      for (let i = 0; i < 12; i++) {
        let budget = disponible;
        debtList.forEach(d => {
          if (d.saldo <= 0) return;
          d.saldo = d.saldo * (1 + monthlyRateEA(d.tasa));
        });

        debtList.forEach(d => {
          if (d.saldo <= 0 || budget <= 0) return;
          const minPay = Math.min(d.saldo, d.cuota);
          const pay = Math.min(minPay, budget);
          d.saldo -= pay;
          budget -= pay;
          if (d.saldo <= 0 && d.zeroAt === null) d.zeroAt = i;
        });

        while (budget > 0) {
          const target = debtList
            .filter(d => d.saldo > 0)
            .sort((a, b) => b.tasa - a.tasa)[0];
          if (!target) break;
          const pay = Math.min(target.saldo, budget);
          target.saldo -= pay;
          budget -= pay;
          if (target.saldo <= 0 && target.zeroAt === null) target.zeroAt = i;
        }

        const total = debtList.reduce((s, d) => s + Math.max(0, d.saldo), 0);
        debtSeries.push(total);
      }

      let ahorroAc = 0;
      const ahorroSeries = labels.map(() => {
        ahorroAc += ahorro;
        return ahorroAc;
      });

      let invAc = 0;
      const invRate = Math.pow(1 + 0.12, 1 / 12) - 1;
      const inversionSeries = labels.map(() => {
        invAc = (invAc + inversion) * (1 + invRate);
        return invAc;
      });

      const gastoSeries = labels.map(() => gasto);
      const milestones = debtList.filter(d => d.zeroAt !== null).map(d => ({ debt: d.name, idx: d.zeroAt }));
      return { labels, ingreso, deuda: debtSeries, gastos: gastoSeries, ahorro: ahorroSeries, inversion: inversionSeries, milestones };
    }

    function acumuladoRange() {
      if (ui.acumuladoMode === 'semana') {
        const wk = ui.acumuladoWeek;
        if (!wk) return null;
        const [yStr, wStr] = wk.split('-W');
        const y = Number(yStr);
        const w = Number(wStr);
        if (!y || !w) return null;
        const jan4 = new Date(Date.UTC(y, 0, 4));
        const jan4Day = jan4.getUTCDay() || 7;
        const monday1 = new Date(jan4);
        monday1.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
        const monday = new Date(monday1);
        monday.setUTCDate(monday1.getUTCDate() + (w - 1) * 7);
        const sunday = new Date(monday);
        sunday.setUTCDate(monday.getUTCDate() + 6);
        return { from: monday.toISOString().slice(0, 10), to: sunday.toISOString().slice(0, 10), label: `Semana ${w} - ${y}` };
      }
      if (ui.acumuladoMode === 'mes') {
        const mk = ui.acumuladoMonth || currentMonthKey();
        const [y, m] = mk.split('-').map(Number);
        const last = new Date(y, m, 0).getDate();
        return { from: `${y}-${pad(m)}-01`, to: `${y}-${pad(m)}-${pad(last)}`, label: monthName(mk) };
      }
      if (ui.acumuladoMode === 'anio') {
        const y = Number(ui.acumuladoYear);
        return { from: `${y}-01-01`, to: `${y}-12-31`, label: `Año ${y}` };
      }
      if (!ui.acumuladoFrom || !ui.acumuladoTo) return null;
      return { from: ui.acumuladoFrom, to: ui.acumuladoTo, label: `${fmtDate(ui.acumuladoFrom)} - ${fmtDate(ui.acumuladoTo)}` };
    }

    function plFromMovements(movs) {
      const ing = {};
      const egr = {};
      let capital = 0;
      let deudas = 0;
      movs.forEach(m => {
        if (m.tipo === 'ingreso') ing[m.categoria || 'Otros'] = (ing[m.categoria || 'Otros'] || 0) + n(m.monto);
        if (m.tipo === 'capital') capital += n(m.monto);
        if (m.tipo === 'egreso') egr[m.categoria || 'Otros'] = (egr[m.categoria || 'Otros'] || 0) + n(m.monto);
        if (m.tipo === 'pago_deuda') deudas += n(m.monto);
      });
      const totalIng = Object.values(ing).reduce((s, v) => s + v, 0) + capital;
      const totalEgr = Object.values(egr).reduce((s, v) => s + v, 0) + deudas;
      return { ing, egr, capital, deudas, totalIng, totalEgr, res: totalIng - totalEgr };
    }

    function upsertCobrarIngreso(item, cuentaId, fechaCobro) {
      const fecha = fechaCobro || todayISO();
      const movementBase = {
        tipo: 'ingreso',
        fecha,
        monto: n(item.monto),
        concepto: `Cobro de ${item.deudor}`,
        categoria: 'Cobro deuda',
        notas: item.notas || '',
        cuenta_id: cuentaId,
        origen_cobrar_id: item.id
      };
      if (item.movimiento_id) {
        const m = state.movimientos.find(x => x.id === item.movimiento_id);
        if (m) Object.assign(m, movementBase);
        else {
          const id = uid();
          state.movimientos.push({ id, ...movementBase });
          item.movimiento_id = id;
        }
      } else {
        const id = uid();
        state.movimientos.push({ id, ...movementBase });
        item.movimiento_id = id;
      }
      item.estado = 'Cobrado';
      item.cuenta_id = cuentaId;
      item.fecha_cobro = fecha;
    }

      if (!m) return;
      const linkedCobrar = m.cobrar_id ? state.cobrar.find(c => c.id === m.cobrar_id) : null;

      if (m.tipo === 'por_cobrar' && linkedCobrar) {

        data.fecha_vencimiento = linkedCobrar.fecha_vencimiento;

      openModal('Editar movimiento', `

            <div class="field"><label>Fecha</label><input type="date" name="fecha" value="${escapeHtml(m.fecha || todayISO())}" required /></div>
            <div class="field"><label>Monto</label><input class="num" type="number" min="0" step="1" name="monto" value="${n(m.monto)}" required /></div>
            <div class="field"><label>Concepto</label><input name="concepto" value="${escapeHtml(m.concepto || '')}" required /></div>
            <div class="field"><label>Notas</label><input name="notas" value="${escapeHtml(m.notas || '')}" /></div>
          </div>
          <div class="row" style="margin-top:12px"><button class="btn grn" type="submit">Guardar cambios</button></div>

      const title = c ? 'Editar cuenta' : 'Nueva cuenta';
      const current = c ? getAccountBalance(c) : 0;
      openModal(title, `
        <form id="modalAccountForm">
          <input type="hidden" name="id" value="${c ? c.id : ''}" />
          <div class="form-grid">
            <div class="field"><label>Nombre</label><input name="nombre" value="${escapeHtml(c?.nombre || '')}" required /></div>
            <div class="field"><label>Tipo</label><select name="tipo">${ACCOUNT_TYPES.map(t => `<option value="${t}" ${c?.tipo === t ? 'selected' : ''}>${t}</option>`).join('')}</select></div>
            <div class="field"><label>Saldo ${c ? 'actual' : 'inicial'}</label><input class="num" type="number" min="0" step="1" name="saldo_actual" value="${n(current || c?.saldo_inicial)}" required /></div>
            <div class="field"><label>Color</label><select name="color">${['verde','azul','morado','amarillo','rojo'].map(k => `<option value="${k}" ${c?.color === k || (!c && k==='azul') ? 'selected' : ''}>${k}</option>`).join('')}</select></div>
            <div class="field" style="grid-column:1/-1"><label>Notas</label><input name="notas" value="${escapeHtml(c?.notas || '')}" /></div>
          </div>
          <div class="row" style="margin-top:12px"><button class="btn blu" type="submit">${c ? 'Actualizar' : 'Crear cuenta'}</button></div>
        </form>
      `);
    }

        <form id="modalCobrarForm">

          <div class="form-grid">
            <div class="field"><label>Deudor</label><input name="deudor" required value="${escapeHtml(item?.deudor || '')}" /></div>
            <div class="field"><label>Monto</label><input class="num" type="number" min="0" step="1" name="monto" required value="${n(item?.monto)}" /></div>
            <div class="field"><label>Fecha vencimiento</label><input type="date" name="fecha_vencimiento" required value="${escapeHtml(item?.fecha_vencimiento || todayISO())}" /></div>

            <div class="field"><label>Fecha cobro</label><input type="date" name="fecha_cobro" value="${escapeHtml(item?.fecha_cobro || todayISO())}" /></div>

          <div class="row" style="margin-top:12px"><button class="btn grn" type="submit">Confirmar cobro</button></div>

    function openDebtModal(id = '') {
      const d = id ? state.deudas.find(x => x.id === id) : null;
      const saldoActual = d ? getDebtBalance(d) : 0;
      openModal(d ? 'Editar deuda' : 'Nueva deuda', `
        <form id="modalDebtForm">

          <div class="form-grid">
            <div class="field"><label>Acreedor</label><input name="acreedor" value="${escapeHtml(d?.acreedor || '')}" required /></div>

    function openAbonoModal(id) {

      if (!d) return;

          <div class="field" style="margin-top:8px"><label>Fecha</label><input type="date" name="fecha" value="${todayISO()}" required /></div>

    function downloadText(filename, text, mime) {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function handleClick(e) {
      const nav = e.target.closest('[data-route]');
      if (nav) {
        ui.route = nav.dataset.route;
        render();
        return;
      }

      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'go-registrar') { ui.route = 'registrar'; render(); return; }
      if (action === 'go-cobrar') { ui.route = 'cobrar'; render(); return; }
      if (action === 'go-pagar') { ui.route = 'pagar'; render(); return; }
      if (action === 'reg-type') { ui.registerType = btn.dataset.type; render(); return; }
      if (action === 'edit-mov') { openEditMovementModal(btn.dataset.id); return; }
      if (action === 'del-mov') {
        const id = btn.dataset.id;
        if (!confirm('¿Estás seguro? Esta acción no se puede deshacer')) return;
        const mov = state.movimientos.find(m => m.id === id);
        if (!mov) return;
        if (mov.cobrar_id) state.cobrar = state.cobrar.filter(c => c.id !== mov.cobrar_id);
        const linkedCobro = state.cobrar.find(c => c.movimiento_id === id);
        if (linkedCobro) setCobrarPending(linkedCobro);
        state.movimientos = state.movimientos.filter(m => m.id !== id);
        persist();
        showToast('Movimiento eliminado', 'ok');
        render();
        return;
      }

      if (action === 'new-account') { openAccountModal(); return; }
      if (action === 'edit-account') { openAccountModal(btn.dataset.id); return; }
      if (action === 'del-account') {
        const c = state.cuentas.find(x => x.id === btn.dataset.id);
        if (!c) return;
        const bal = getAccountBalance(c);
        const linkedMoves = getAccountMovements(c.id).length;
        if (bal > 0 && !confirm('La cuenta tiene saldo mayor a 0. ¿Deseas eliminarla?')) return;
        if (linkedMoves > 0 && !confirm('Esta cuenta tiene movimientos asociados. Si la eliminas, esos movimientos quedarán sin cuenta. ¿Deseas continuar?')) return;
        if (!confirm('¿Estás seguro? Esta acción no se puede deshacer')) return;
        state.cuentas = state.cuentas.filter(x => x.id !== c.id);
        persist();
        showToast('Cuenta eliminada', 'ok');
        render();
        return;
      }

      if (action === 'cobrar-filter') { ui.cobrarFilter = btn.dataset.filter; render(); return; }
      if (action === 'new-cobrar') { openCobrarModal(); return; }
      if (action === 'edit-cobrar') { openCobrarModal(btn.dataset.id); return; }
      if (action === 'collect-cobrar') { openCollectModal(btn.dataset.id); return; }
      if (action === 'del-cobrar') {
        if (!confirm('¿Estás seguro? Esta acción no se puede deshacer')) return;
        const id = btn.dataset.id;
        const c = state.cobrar.find(x => x.id === id);
        if (c?.movimiento_id) state.movimientos = state.movimientos.filter(m => m.id !== c.movimiento_id);
        state.cobrar = state.cobrar.filter(x => x.id !== id);
        persist();
        showToast('Registro eliminado', 'ok');
        render();
        return;
      }

      if (action === 'new-debt') { openDebtModal(); return; }
      if (action === 'edit-debt') { openDebtModal(btn.dataset.id); return; }
      if (action === 'quick-abono') { openAbonoModal(btn.dataset.id); return; }
      if (action === 'del-debt') {
        if (!confirm('¿Estás seguro? Esta acción no se puede deshacer')) return;
        const id = btn.dataset.id;
        state.deudas = state.deudas.filter(d => d.id !== id);
        state.movimientos = state.movimientos.filter(m => !(m.tipo === 'pago_deuda' && m.deuda_id === id));
        persist();
        showToast('Deuda eliminada', 'ok');
        render();
        return;
      }

      if (action === 'flujo-prev') { ui.flujoMonth = shiftMonthKey(ui.flujoMonth, -1); render(); return; }
      if (action === 'flujo-next') { ui.flujoMonth = shiftMonthKey(ui.flujoMonth, 1); render(); return; }
      if (action === 'ac-mode') { ui.acumuladoMode = btn.dataset.mode; ui.acumuladoResult = null; render(); return; }

      if (action === 'export-csv') {
        if (!ui.acumuladoResult) return;
        const rows = ui.acumuladoResult.movs;
        const header = ['fecha','tipo','concepto','categoria','cuenta','monto','notas'];
        const csv = [header.join(',')].concat(rows.map(m => {
          const vals = [m.fecha, m.tipo, m.concepto || '', m.categoria || '', getAccountName(m.cuenta_id), n(m.monto), m.notas || ''];
          return vals.map(v => `"${String(v).replaceAll('"', '""')}"`).join(',');
        })).join('\n');
        downloadText(`acumulado_${Date.now()}.csv`, csv, 'text/csv;charset=utf-8');
        return;
      }

      if (action === 'export-json') {
        downloadText(`${STORAGE_KEY}_${getAuthUserId() || 'user'}_${Date.now()}.json`, JSON.stringify(state, null, 2), 'application/json;charset=utf-8');
        return;
      }

      if (action === 'trigger-import') {
        document.getElementById('importJsonInput')?.click();
        return;
      }

      if (action === 'load-martin') {
        const userId = getAuthUserId();
        const payload = USER_BOOTSTRAP_PAYLOADS[userId];
        if (!payload) return;
        if (!confirm('Se cargarán tus datos y se reemplazará la información actual. ¿Continuar?')) return;
        state = normalizeState(payload);
        state.config.nombre = getAuthUser() || state.config.nombre;
        persist();
        localStorage.setItem(`${userStorageKey(userId)}_bootstrap_${USER_BOOTSTRAP_VERSION}`, '1');
        showToast('Datos cargados correctamente', 'ok');
        ui.route = 'dashboard';
        render();
        return;
      }

      if (action === 'logout-user') {
        sessionStorage.removeItem(AUTH_SESSION_KEY);
        loadedUserId = '';
        state = emptyState();
        ui.route = 'dashboard';
        ui.acumuladoResult = null;
        render();
        return;
      }

      if (action === 'reset-data') {
        if (!confirm('¿Estás seguro? Esta acción no se puede deshacer')) return;
        if (!confirm('Confirmación final: se borrará toda la información')) return;
        resetAllData();
        showToast('Datos borrados', 'warn');
        return;
      }
    }

    function handleSubmit(e) {
      const form = e.target;
      if (!(form instanceof HTMLFormElement)) return;

      if (form.id === 'accessForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const userId = String(fd.get('usuario') || '');
        const secuencia = String(fd.get('secuencia') || '').trim();
        const match = ACCESS_USERS.find(u => u.id === userId);
        if (!match || secuencia !== match.secuencia) {
          showToast('Secuencia incorrecta', 'err');
          return;
        }
        sessionStorage.setItem(AUTH_SESSION_KEY, match.id);
        loadedUserId = match.id;
        state = loadState(match.id);
        showToast(`Bienvenido ${match.nombre}`, 'ok');
        render();
        return;
      }

      if (form.id === 'setupForm') {
        e.preventDefault();
        const fd = new FormData(form);
        state.config.nombre = getAuthUser();
        state.config.deuda_inicial_total = n(fd.get('deuda_inicial_total'));
        state.config.ingreso_mensual = n(fd.get('ingreso_mensual'));
        state.proyeccion.ingreso_mensual = n(fd.get('ingreso_mensual'));
        persist();
        ui.route = 'dashboard';
        showToast('Configuración inicial guardada', 'ok');
        render();
        return;
      }

      if (form.id === 'registrarForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const tipo = String(fd.get('tipo'));
        const monto = n(fd.get('monto'));
        if (monto <= 0) { showToast('Monto inválido', 'err'); return; }

        const mov = {
          id: uid(),
          tipo,
          fecha: String(fd.get('fecha') || todayISO()),
          monto,
          concepto: String(fd.get('concepto') || '').trim(),
          notas: String(fd.get('notas') || '').trim(),
          categoria: ''
        };

        if (tipo === 'ingreso') {
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!cuenta) { showToast('Selecciona una cuenta', 'err'); return; }
          mov.categoria = String(fd.get('categoria') || 'Otros');
          mov.cuenta_id = cuenta;
        } else if (tipo === 'egreso') {
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!cuenta) { showToast('Selecciona cuenta origen', 'err'); return; }
          mov.categoria = String(fd.get('categoria') || 'Otros');
          mov.medio_pago = String(fd.get('medio_pago') || 'Débito');
          mov.cuenta_id = cuenta;
        } else if (tipo === 'pago_deuda') {
          const deudaId = String(fd.get('deuda_id') || '');
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!deudaId) { showToast('Selecciona una deuda', 'err'); return; }
          if (!cuenta) { showToast('Selecciona cuenta origen', 'err'); return; }
          mov.deuda_id = deudaId;
          mov.cuenta_id = cuenta;
          mov.pago_tipo = String(fd.get('pago_tipo') || 'Cuota regular');
          mov.categoria = state.deudas.find(d => d.id === deudaId)?.acreedor || 'Deuda';
        } else if (tipo === 'por_cobrar') {
          const cobrarId = uid();
          const deudor = String(fd.get('deudor') || '').trim();
          const venc = String(fd.get('fecha_vencimiento') || todayISO());
          if (!deudor) { showToast('Debes ingresar deudor', 'err'); return; }
          state.cobrar.push({ id: cobrarId, deudor, monto, fecha_vencimiento: venc, notas: mov.notas, estado: 'Pendiente', cuenta_id: '', fecha_cobro: '', movimiento_id: '' });
          mov.cobrar_id = cobrarId;
          mov.deudor = deudor;
          mov.fecha_vencimiento = venc;
          mov.categoria = 'Por cobrar';
        } else if (tipo === 'capital') {
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!cuenta) { showToast('Selecciona una cuenta', 'err'); return; }
          mov.cuenta_id = cuenta;
          mov.fuente = String(fd.get('fuente') || '').trim();
          mov.categoria = 'Capital';
        }

        if (!mov.concepto) mov.concepto = TYPE_META[tipo]?.label || 'Movimiento';
        state.movimientos.push(mov);
        persist();
        showToast('Movimiento guardado', 'ok');
        render();
        return;
      }

      if (form.id === 'modalMovementForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const id = String(fd.get('id'));
        const m = state.movimientos.find(x => x.id === id);
        if (!m) return;

        const monto = n(fd.get('monto'));
        if (monto <= 0) { showToast('Monto inválido', 'err'); return; }

        m.fecha = String(fd.get('fecha') || m.fecha);
        m.monto = monto;
        m.concepto = String(fd.get('concepto') || '').trim();
        m.notas = String(fd.get('notas') || '').trim();

        if (m.tipo === 'ingreso') {
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!cuenta) { showToast('Selecciona cuenta', 'err'); return; }
          m.categoria = String(fd.get('categoria') || 'Otros');
          m.cuenta_id = cuenta;
        }
        if (m.tipo === 'egreso') {
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!cuenta) { showToast('Selecciona cuenta origen', 'err'); return; }
          m.categoria = String(fd.get('categoria') || 'Otros');
          m.medio_pago = String(fd.get('medio_pago') || 'Débito');
          m.cuenta_id = cuenta;
        }
        if (m.tipo === 'pago_deuda') {
          const deuda = String(fd.get('deuda_id') || '');
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!deuda) { showToast('Selecciona deuda', 'err'); return; }
          if (!cuenta) { showToast('Selecciona cuenta origen', 'err'); return; }
          m.deuda_id = deuda;
          m.cuenta_id = cuenta;
          m.pago_tipo = String(fd.get('pago_tipo') || 'Cuota regular');
          m.categoria = state.deudas.find(d => d.id === deuda)?.acreedor || 'Deuda';
        }
        if (m.tipo === 'por_cobrar') {
          const deudor = String(fd.get('deudor') || '').trim();
          const fv = String(fd.get('fecha_vencimiento') || todayISO());
          m.deudor = deudor;
          m.fecha_vencimiento = fv;
          m.categoria = 'Por cobrar';
          if (m.cobrar_id) {
            const c = state.cobrar.find(x => x.id === m.cobrar_id);
            if (c) {
              c.deudor = deudor;
              c.monto = monto;
              c.fecha_vencimiento = fv;
              c.notas = m.notas;
              if (c.estado === 'Cobrado' && c.cuenta_id) upsertCobrarIngreso(c, c.cuenta_id, c.fecha_cobro || todayISO());
            }
          }
        }
        if (m.tipo === 'capital') {
          const cuenta = String(fd.get('cuenta_id') || '');
          if (!cuenta) { showToast('Selecciona cuenta', 'err'); return; }
          m.cuenta_id = cuenta;
          m.fuente = String(fd.get('fuente') || '').trim();
          m.categoria = 'Capital';
        }

        persist();
        closeModal();
        showToast('Movimiento actualizado', 'ok');
        render();
        return;
      }

      if (form.id === 'modalAccountForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const id = String(fd.get('id') || '');
        const nombre = String(fd.get('nombre') || '').trim();
        if (!nombre) { showToast('Nombre requerido', 'err'); return; }
        const saldoActual = n(fd.get('saldo_actual'));
        const data = {
          nombre,
          tipo: String(fd.get('tipo') || 'Corriente'),
          color: String(fd.get('color') || 'azul'),
          notas: String(fd.get('notas') || '').trim()
        };
        if (id) {
          const c = state.cuentas.find(x => x.id === id);
          if (!c) return;
          const inflows = getAccountInflows(c.id);
          const outflows = getAccountOutflows(c.id);
          Object.assign(c, data, { saldo_inicial: saldoActual - inflows + outflows });
        } else {
          state.cuentas.push({ id: uid(), ...data, saldo_inicial: saldoActual });
        }
        persist();
        closeModal();
        showToast('Cuenta guardada', 'ok');
        render();
        return;
      }

      if (form.id === 'modalCobrarForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const id = String(fd.get('id') || '');
        const deudor = String(fd.get('deudor') || '').trim();
        const monto = n(fd.get('monto'));
        const venc = String(fd.get('fecha_vencimiento') || todayISO());
        const notas = String(fd.get('notas') || '').trim();
        const estado = String(fd.get('estado') || 'Pendiente');
        const cuentaId = String(fd.get('cuenta_id') || '');
        const fechaCobro = String(fd.get('fecha_cobro') || todayISO());

        if (!deudor || monto <= 0) { showToast('Datos incompletos', 'err'); return; }
        if (estado === 'Cobrado' && !cuentaId) { showToast('Selecciona cuenta de depósito', 'err'); return; }

        let item;
        if (id) {
          item = state.cobrar.find(x => x.id === id);
          if (!item) return;
          item.deudor = deudor;
          item.monto = monto;
          item.fecha_vencimiento = venc;
          item.notas = notas;
        } else {
          item = { id: uid(), deudor, monto, fecha_vencimiento: venc, notas, estado: 'Pendiente', cuenta_id: '', fecha_cobro: '', movimiento_id: '' };
          state.cobrar.push(item);
        }

        if (estado === 'Cobrado') upsertCobrarIngreso(item, cuentaId, fechaCobro);
        else setCobrarPending(item);

        persist();
        closeModal();
        showToast('Registro guardado', 'ok');
        render();
        return;
      }

      if (form.id === 'modalCollectForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const id = String(fd.get('id'));
        const cuentaId = String(fd.get('cuenta_id') || '');
        const fecha = String(fd.get('fecha_cobro') || todayISO());
        const item = state.cobrar.find(x => x.id === id);
        if (!item || !cuentaId) return;
        upsertCobrarIngreso(item, cuentaId, fecha);
        persist();
        closeModal();
        showToast('Cobro registrado', 'ok');
        render();
        return;
      }

      if (form.id === 'modalDebtForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const id = String(fd.get('id') || '');
        const acreedor = String(fd.get('acreedor') || '').trim();
        if (!acreedor) { showToast('Acreedor requerido', 'err'); return; }
        const saldoActual = n(fd.get('saldo_actual'));
        const data = {
          acreedor,
          cuota: n(fd.get('cuota')),
          tasa_ea: n(fd.get('tasa_ea')),
          prox_pago: String(fd.get('prox_pago') || todayISO()),
          notas: String(fd.get('notas') || '').trim()
        };
        if (id) {
          const d = state.deudas.find(x => x.id === id);
          if (!d) return;
          const paid = getDebtPaid(id);
          Object.assign(d, data, { saldo_inicial: saldoActual + paid });
        } else {
          state.deudas.push({ id: uid(), ...data, saldo_inicial: saldoActual });
        }
        ensureMonthSnapshot(currentMonthKey());
        persist();
        closeModal();
        showToast('Deuda guardada', 'ok');
        render();
        return;
      }

      if (form.id === 'modalAbonoForm') {
        e.preventDefault();
        const fd = new FormData(form);
        const deudaId = String(fd.get('deuda_id') || '');
        const cuentaId = String(fd.get('cuenta_id') || '');
        const monto = n(fd.get('monto'));
        if (!deudaId || monto <= 0 || !cuentaId) { showToast('Datos inválidos', 'err'); return; }
        const deuda = state.deudas.find(d => d.id === deudaId);
        state.movimientos.push({
          id: uid(),
          tipo: 'pago_deuda',
          fecha: String(fd.get('fecha') || todayISO()),
          monto,
          concepto: `Abono a ${deuda?.acreedor || 'deuda'}`,
          categoria: deuda?.acreedor || 'Deuda',
          notas: String(fd.get('notas') || ''),
          deuda_id: deudaId,
          cuenta_id: cuentaId,
          pago_tipo: 'Abono extra'
        });
        persist();
        closeModal();
        showToast('Abono registrado', 'ok');
        render();
        return;
      }

      if (form.id === 'proyForm') {
        e.preventDefault();
        const fd = new FormData(form);
        state.proyeccion.ingreso_mensual = n(fd.get('ingreso_mensual'));
        state.proyeccion.disponible_deuda = n(fd.get('disponible_deuda'));
        state.proyeccion.gasto_fijo_mensual = n(fd.get('gasto_fijo_mensual'));
        state.proyeccion.ahorro_mensual = n(fd.get('ahorro_mensual'));
        state.proyeccion.inversion_mensual = n(fd.get('inversion_mensual'));
        persist();
        showToast('Proyección actualizada', 'ok');
        render();
        return;
      }

      if (form.id === 'acumuladoForm') {
        e.preventDefault();
        const fd = new FormData(form);
        if (ui.acumuladoMode === 'semana') ui.acumuladoWeek = String(fd.get('week') || '');
        if (ui.acumuladoMode === 'mes') ui.acumuladoMonth = String(fd.get('month') || '');
        if (ui.acumuladoMode === 'anio') ui.acumuladoYear = Number(fd.get('year') || new Date().getFullYear());
        if (ui.acumuladoMode === 'rango') {
          ui.acumuladoFrom = String(fd.get('from') || '');
          ui.acumuladoTo = String(fd.get('to') || '');
        }
        const range = acumuladoRange();
        if (!range) { showToast('Completa los filtros de búsqueda', 'warn'); return; }
        const movs = state.movimientos.filter(m => m.fecha >= range.from && m.fecha <= range.to);
        ui.acumuladoResult = { ...range, movs };
        render();
        return;
      }

      if (form.id === 'configForm') {
        e.preventDefault();
        const fd = new FormData(form);
        state.config.nombre = getAuthUser();
        state.config.deuda_inicial_total = n(fd.get('deuda_inicial_total'));
        state.config.ingreso_mensual = n(fd.get('ingreso_mensual'));
        if (!n(state.proyeccion.ingreso_mensual)) state.proyeccion.ingreso_mensual = n(state.config.ingreso_mensual);
        persist();
        showToast('Configuración guardada', 'ok');
        render();
      }
    }

    function handleInput(e) {
      const t = e.target;
      if (t instanceof HTMLInputElement && t.id === 'movSearch') {
        ui.registerSearch = t.value;
        if (ui.route === 'registrar') render();
      }
    }

    function handleChange(e) {
      const t = e.target;
      if (!(t instanceof HTMLElement)) return;

      if (t.id === 'estadoMonthSel') {
        ui.estadoMonth = n(t.value);
        render();
        return;
      }
      if (t.id === 'estadoYearSel') {
        ui.estadoYear = n(t.value);
        render();
        return;
      }

      if (t instanceof HTMLSelectElement && t.name === 'estado' && t.form?.id === 'modalCobrarForm') {
        const extra = document.getElementById('cobradoExtra');
        if (!extra) return;
        if (t.value === 'Cobrado') extra.classList.remove('hidden');
        else extra.classList.add('hidden');
        return;
      }

      if (t.id === 'importJsonInput' && t instanceof HTMLInputElement && t.files?.[0]) {
        const file = t.files[0];
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || '{}'));
            state = normalizeState(parsed);
            state.config.nombre = getAuthUser();
            persist();
            ui.route = 'dashboard';
            ui.acumuladoResult = null;
            showToast('Datos importados correctamente', 'ok');
            render();
          } catch {
            showToast('JSON inválido', 'err');
          }
        };
        reader.readAsText(file);
      }
    }

    function handleKeydown(e) {
      if (e.key === 'Escape' && modalOverlay.classList.contains('show')) closeModal();
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    document.addEventListener('click', handleClick);
    document.addEventListener('submit', handleSubmit);
    document.addEventListener('input', handleInput);
    document.addEventListener('change', handleChange);
    document.addEventListener('keydown', handleKeydown);

    const bootUserId = getAuthUserId();
    if (bootUserId && localStorage.getItem(userStorageKey(bootUserId))) lastSaveAt = new Date().toISOString();
    render();
  </script>
</body>
</html>
