    function saveMovementEdit(form) {
      ensureStateCollections();
      const data = readForm(form);
      const id = data.id;
      const idx = state.movimientos.findIndex((m) => String(m.id) === String(id));
      if (idx < 0) {
        showToast('Movimiento no encontrado.', 'err');
        closeModal();
        return;
      }

      const old = state.movimientos[idx];
      const oldType = normalizeMovementType(old);
      const edited = buildMovementPayload(data, old.id);
      const validation = validateMovementPayload(edited);
      if (validation) {
        showToast(validation, 'err');
        return;
      }

      removeMovementInternal(old, {
        keepArray: true,
        deleteLinkedCobrar: false,
        revertCobro: false
      });

      if (oldType === 'por_cobrar' && old.cobrar_id && edited.tipo !== 'por_cobrar') {
        deleteCobrarRecord(old.cobrar_id, {
          removeIngresoMovement: true,
          removeRegistroMovement: false,
          skipMovementId: old.id
        });
      }

      if (edited.tipo === 'por_cobrar') {
        let linked = old.cobrar_id ? cobrarById(old.cobrar_id) : null;
        if (!linked) {
          linked = {
            id: nextEntityId(state.cobrar),
            deudor: '',
            monto: 0,
            fecha_vencimiento: todayISO(),
            estado: 'pendiente',
            notas: '',
            cuenta_id: '',
            fecha_cobro: '',
            movimiento_id: ''
          };
          state.cobrar.push(linked);
        }
        linked.deudor = edited.deudor || edited.concepto || linked.deudor || 'Sin deudor';
        linked.monto = edited.monto;
        linked.fecha_vencimiento = normalizeDate(edited.fecha_vencimiento || edited.fecha);
        linked.notas = edited.notas || '';
        if (String(linked.estado).toLowerCase() !== 'cobrado') linked.estado = normalizeCobrarState('pendiente', linked.fecha_vencimiento);
        edited.cobrar_id = String(linked.id);
        edited.deudor = linked.deudor;
        edited.fecha_vencimiento = linked.fecha_vencimiento;
        edited.categoria = 'Por cobrar';
        if (String(linked.estado || '').toLowerCase() === 'cobrado') {
          const ok = upsertCobrarIngreso(linked);
          if (!ok) {
            showToast('Selecciona cuenta para el cobro vinculado.', 'err');
            return;
          }
        }
      }

      if (old.cobro_id) {
        const linkedCobro = cobrarById(old.cobro_id);
        if (linkedCobro) {
          if (edited.tipo === 'ingreso') {
            edited.cobro_id = String(old.cobro_id);
            linkedCobro.estado = 'cobrado';
            linkedCobro.monto = edited.monto;
            linkedCobro.cuenta_id = edited.cuenta_id || linkedCobro.cuenta_id;
            linkedCobro.fecha_cobro = edited.fecha;
            linkedCobro.movimiento_id = String(edited.id);
          } else {
            linkedCobro.estado = 'pendiente';
            linkedCobro.movimiento_id = '';
            linkedCobro.fecha_cobro = '';
          }
        }
      }

      state.movimientos[idx] = edited;
      applyMovementEffect(edited, 1);
      commitState('Movimiento actualizado');
      closeModal();
    }

    function saveCobrarForm(form) {
      ensureStateCollections();

      let previous = null;
      if (editId) {
        editIdx = state.cobrar.findIndex((c) => String(c.id) === editId);
        if (editIdx < 0) {
          showToast('Registro no encontrado.', 'err');
          closeModal();
          return;
        }
        previous = state.cobrar[editIdx];
      }
      const payload = {
        id: editId || nextEntityId(state.cobrar),
        deudor: String(data.deudor || '').trim() || 'Sin deudor',
        monto: Math.abs(toNumber(data.monto)),
        fecha_vencimiento: normalizeDate(data.fecha_vencimiento || todayISO()),
        estado: String(data.estado || 'pendiente').toLowerCase() === 'cobrado' ? 'cobrado' : 'pendiente',

        cuenta_id: String(data.cuenta_id || ''),
        fecha_cobro: normalizeDate(data.fecha_cobro || todayISO()),
        movimiento_id: ''
      };

      if (!payload.monto || payload.monto <= 0) {
        showToast('Ingresa un monto válido.', 'err');
        return;
      }

      if (payload.estado === 'cobrado') {
        if (!payload.cuenta_id) {
          showToast('Selecciona una cuenta para marcar como cobrado.', 'err');
          return;
        }
      }

      if (editId) {
        payload.movimiento_id = String(previous?.movimiento_id || '');
        state.cobrar[editIdx] = payload;
      } else {
        state.cobrar.push(payload);
      }

      if (payload.estado === 'cobrado') {
        const ok = upsertCobrarIngreso(payload);
        if (!ok) {
          showToast('No se pudo generar el ingreso de cobro.', 'err');
          return;
        }
      } else {
        upsertCobrarIngreso(payload);
      }

      const movementRow = state.movimientos.find((m) => String(m.cobrar_id || '') === String(payload.id));
      if (movementRow) {
        movementRow.deudor = payload.deudor;

    function handleAction(actionEl) {
      const action = actionEl.getAttribute('data-action') || '';
      const id = actionEl.getAttribute('data-id') || '';
      const type = actionEl.getAttribute('data-type') || '';
      const target = actionEl.getAttribute('data-target') || '';

      if (action === 'close-modal') closeModal();
      if (action === 'switch-user') {
        switchUser();
        return;
      }
      if (action === 'quick-registrar') setRoute('registrar');
      if (action === 'goto-route') setRoute(target || 'dashboard');

      if (action === 'set-register-type') {
        ui.registerType = normalizeTipo(type || 'ingreso');
        renderRoute('registrar');
      }

      if (action === 'edit-movement') openMovementEditModal(id);
      if (action === 'delete-movement') {
        if (!confirm(CONFIRM_MSG)) return;
        const m = movementById(id);
        if (!m) return;
        removeMovementInternal(m, {
          keepArray: false,
          deleteLinkedCobrar: true,
          revertCobro: true
        });
        commitState('Movimiento eliminado');
      }

      if (action === 'new-cuenta') openCuentaModal('');
      if (action === 'edit-cuenta') openCuentaModal(id);
      if (action === 'delete-cuenta') {
        if (!confirm(CONFIRM_MSG)) return;
        const idx = state.cuentas.findIndex((c) => String(c.id) === String(id));
        if (idx < 0) return;
        state.cuentas.splice(idx, 1);
        state.movimientos.forEach((m) => {
          if (String(m.cuenta_id || '') === String(id)) m.cuenta_id = '';
        });
        state.cobrar.forEach((c) => {
          if (String(c.cuenta_id || '') === String(id)) c.cuenta_id = '';
        });
        commitState('Cuenta eliminada');
      }

      if (action === 'cobrar-filter') {
        ui.cobrarFilter = actionEl.getAttribute('data-filter') || 'Todos';
        renderRoute('cobrar');
      }
      if (action === 'new-cobrar') openCobrarModal('');
      if (action === 'edit-cobrar') openCobrarModal(id);
      if (action === 'delete-cobrar') {
        if (!confirm(CONFIRM_MSG)) return;
        deleteCobrarRecord(id, {
          removeIngresoMovement: true,
          removeRegistroMovement: true
        });
        commitState('Registro eliminado');
      }
      if (action === 'cobrar-item') openCobrarDepositoModal(id);

      if (action === 'new-deuda') openDeudaModal('');
      if (action === 'edit-deuda') openDeudaModal(id);
      if (action === 'delete-deuda') {
        if (!confirm(CONFIRM_MSG)) return;
        const idx = state.deudas.findIndex((d) => String(d.id) === String(id));
        if (idx < 0) return;
        const removed = state.deudas[idx];
        state.deudas.splice(idx, 1);
        state.movimientos.forEach((m) => {
          if (String(m.deuda_id || '') === String(id)) {
            m.deuda_id = '';
            m.categoria = m.categoria || removed.acreedor;
          }
        });
        Object.values(state.mes_inicio).forEach((snap) => {
          if (snap && typeof snap === 'object') delete snap[String(id)];
        });
        commitState('Deuda eliminada');
      }
      if (action === 'abono-deuda') openAbonoModal(id);

      if (action === 'flow-prev') {
        ui.flowMonth = shiftMonth(ui.flowMonth, -1);
        renderRoute('flujo');
      }
      if (action === 'flow-next') {
        ui.flowMonth = shiftMonth(ui.flowMonth, 1);
        renderRoute('flujo');
      }

      if (action === 'ac-tab') {
        ui.acMode = actionEl.getAttribute('data-tab') || 'mes';
        ui.acResult = null;
        renderRoute('acumulado');
      }

      if (action === 'export-ac-csv') {
        if (!ui.acResult || !ui.acResult.movs) {
          showToast('Primero ejecuta una búsqueda.', 'warn');
          return;
        }
        const csv = movementToCsv(sortByDateDesc(ui.acResult.movs));
        downloadText(`acumulado_${todayISO()}.csv`, csv, 'text/csv;charset=utf-8');
      }

      if (action === 'gh-sync-now' && activeUserId) { ghSync(activeUserId); showToast('Sincronizando con GitHub...'); }
      if (action === 'gh-remove-token') { localStorage.removeItem(GH_TOKEN_LSKEY); renderShell(); showToast('Token eliminado'); }
      if (action === 'export-json') exportStateJson();
      if (action === 'trigger-import') {
        const input = document.getElementById('import-json-input');
        if (input) input.click();
      }
      if (action === 'reset-app') {
        if (!confirm(CONFIRM_MSG)) return;
        if (!confirm(CONFIRM_MSG)) return;
        if (activeStorageKey) localStorage.removeItem(activeStorageKey);
        sessionStorage.removeItem(SESSION_USER_KEY);
        location.reload();
      }
    }

    function triggerFormSubmit(form) {
      if (!(form instanceof HTMLFormElement)) return;
      const evt = new Event('submit', { bubbles: true, cancelable: true });
      form.dispatchEvent(evt);
    }

    function onClick(event) {
      const submitControl = event.target.closest('button[type="submit"],input[type="submit"]');
      if (submitControl) {
        const form = submitControl.form || submitControl.closest('form');
        if (form) {
          event.preventDefault();
          triggerFormSubmit(form);
          return;
        }
      }
      const routeBtn = event.target.closest('[data-route]');
      if (routeBtn) {
        setRoute(routeBtn.getAttribute('data-route'));
        return;
      }
      const actionEl = event.target.closest('[data-action]');
      if (actionEl) {
        handleAction(actionEl);
      }
    }

    function onChange(event) {
      const actionEl = event.target.closest('[data-action]');
      if (actionEl) {
        const action = actionEl.getAttribute('data-action');
        if (action === 'estado-month') {
          ui.estadoMonth = Number(event.target.value || new Date().getMonth() + 1);
          renderRoute('estado');
        }
        if (action === 'estado-year') {
          ui.estadoYear = Number(event.target.value || new Date().getFullYear());
          renderRoute('estado');
        }
        if (action === 'movement-edit-type') {
          const form = event.target.closest('form');
          if (form) formMovementEditDynamic(form);
        }
      }

      if (event.target.id === 'import-json-input') {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        file.text().then((txt) => {
          const parsed = safeParseState(txt);
          if (!parsed) {
            showToast('Archivo JSON inválido.', 'err');
            return;
          }
          state = normalizeState(parsed);
          ensureStateCollections();
          persistState();
          if (!setupHasContent()) {
            renderSetup();
          } else {
            ensureMonthSnapshot();
            if (!shellMounted) renderShell();
            else renderRoute(ui.route);
          }
          showToast('Datos importados correctamente');
        }).catch(() => {
          showToast('No se pudo leer el archivo.', 'err');
        }).finally(() => {
          event.target.value = '';
        });
      }
    }

    function onInput(event) {
      if (event.target.id === 'register-search') {
        ui.registerSearch = event.target.value || '';
        if (ui.route === 'registrar') renderRoute('registrar');
      }
    }

    function onSubmit(event) {
      const form = event.target;
      if (!(form instanceof HTMLFormElement)) return;
      event.preventDefault();

      try {
        if (form.id === 'auth-form') {
          const data = readForm(form);
          const userId = inferUserByCode(data.codigo || '');
          if (!userId) {
            showToast('Código inválido.', 'err');
            return;
          }
          const ok = activateUser(userId, true);
          if (ok) showToast(`Sesión iniciada: ${getUserProfile(userId)?.name || userId}`);
          return;
        }

        if (form.id === 'setup-form') {
          if (!activeUserId || !activeStorageKey) {
            showToast('Primero inicia sesión.', 'err');
            renderAuth();
            return;
          }
          const data = readForm(form);
          state.config.nombre = String(data.nombre || '');
          state.config.deuda_inicial_total = toNumber(data.deuda_inicial_total);
          state.config.ingreso_mensual = toNumber(data.ingreso_mensual);
          state.config.moneda = state.config.moneda || 'COP';
          persistState();
          ensureMonthSnapshot();
          renderShell();
          setRoute('dashboard');
          showToast('Configuración inicial guardada');
        }

        if (form.id === 'register-form') saveRegisterForm(form);
        if (form.id === 'movement-edit-form') saveMovementEdit(form);
        if (form.id === 'cuenta-form') saveCuentaForm(form);
        if (form.id === 'cobrar-form') saveCobrarForm(form);
        if (form.id === 'cobrar-deposit-form') saveCobrarDepositForm(form);
        if (form.id === 'deuda-form') saveDeudaForm(form);
        if (form.id === 'abono-form') saveAbonoForm(form);
        if (form.id === 'projection-form') saveProjectionForm(form);
        if (form.id === 'acumulado-form') saveAcumuladoForm(form);
        if (form.id === 'config-form') saveConfigForm(form);
        if (form.id === 'gh-token-form') {
          const token = (document.getElementById('gh-token-input')?.value || '').trim();
          if (token) {
            localStorage.setItem(GH_TOKEN_LSKEY, token);
            renderShell();
            showToast('Token guardado — sincronizando...');
            ghSync(activeUserId);
          }
        }
      } catch (err) {
        console.error(err);
        showToast('Error al guardar. Intenta de nuevo.', 'err');
      }
    }

    function onKeyDown(event) {
      if (event.key === 'Escape') {
        if (modalOverlay.classList.contains('show')) closeModal();
        return;
      }
      if (event.key === 'Enter' && !event.shiftKey) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const tag = target.tagName.toLowerCase();
        if (tag === 'textarea') return;
        const form = target.closest('form');
        if (form) {
          event.preventDefault();
          triggerFormSubmit(form);
        }
      }
    }

    document.addEventListener('click', onClick);
    document.addEventListener('change', onChange);
    document.addEventListener('input', onInput);
    document.addEventListener('submit', onSubmit);
    document.addEventListener('keydown', onKeyDown);

    modalOverlay.addEventListener('click', (event) => {
      if (event.target === modalOverlay) closeModal();
    });

    window.addEventListener('beforeunload', () => {
      try {
        persistState();
      } catch {}
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        try {
          persistState();
        } catch {}
      }
    });

    const rememberedUser = String(sessionStorage.getItem(SESSION_USER_KEY) || localStorage.getItem(LAST_USER_KEY) || '').trim().toLowerCase();
    if (getUserProfile(rememberedUser)) {
      activateUser(rememberedUser, false);
    } else {
      renderAuth();
    }
  })();
  </script>
</body>
</html>
