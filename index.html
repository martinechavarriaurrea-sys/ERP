<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Personal Finanzas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0c0f13;
      --bg1:#13181f;
      --bg2:#1a2028;
      --b1:#1e2830;
      --b2:#283340;
      --t1:#eef2f7;
      --t2:#8a9bb0;
      --t3:#4a5f75;
      --grn:#10d98a;
      --grn2:#0aaa6a;
      --gnbg:#071a11;
      --red:#f04060;
      --red2:#c02040;
      --rdbg:#1a080c;
      --amb:#f0a020;
      --amb2:#c07800;
      --ambg:#1a1005;
      --blu:#3080f0;
      --blbg:#050d1a;
      --pur:#9060f0;
      --purbg:#0d0518;
      --sidebar-w: 230px;
      --top-h: 64px;
      --r: 14px;
    }
    * { box-sizing: border-box; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-track { background: var(--bg1); }
    *::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 999px; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--t1);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }
    .num, .money, .amount-input, .kpi-value, input[type="number"] {
      font-family: 'IBM Plex Mono', monospace;
      font-variant-numeric: tabular-nums;
    }
    .app-shell { height: 100vh; width: 100%; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      border-right: 1px solid var(--b1);
      background: linear-gradient(180deg, #141a22, #10151d);
      display: flex;
      flex-direction: column;
      z-index: 20;
    }
    .logo {
      height: var(--top-h);
      border-bottom: 1px solid var(--b1);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      font-weight: 800;
      letter-spacing: .25px;
    }
    .logo-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--grn);
      box-shadow: 0 0 14px var(--grn);
    }
    .nav {
      padding: 12px 8px;
      display: grid;
      gap: 4px;
      overflow: auto;
    }
    .nav-item {
      border: 1px solid transparent;
      border-radius: 11px;
      background: transparent;
      color: var(--t2);
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;
      font: inherit;
      cursor: pointer;
      transition: .15s ease;
    }
    .nav-item:hover { background: var(--bg2); color: var(--t1); }
    .nav-item.active {
      background: #182028;
      border-color: var(--b2);
      color: var(--t1);
    }
    .nav-ico {
      width: 20px;
      text-align: center;
      flex: 0 0 20px;
    }
    .date-widget {
      margin-top: auto;
      border-top: 1px solid var(--b1);
      padding: 12px;
      color: var(--t2);
      font-size: 12px;
      line-height: 1.45;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: var(--top-h);
      border-bottom: 1px solid var(--b1);
      background: rgba(12, 15, 19, .95);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 19;
    }
    .top-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    .main {
      position: fixed;
      top: var(--top-h);
      left: var(--sidebar-w);
      right: 0;
      bottom: 0;
      overflow: auto;
      padding: 16px;
      background: radial-gradient(1200px 450px at 90% -10%, #132030 0%, transparent 45%), var(--bg);
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .panel {
      border: 1px solid var(--b1);
      background: linear-gradient(180deg, #171e27 0%, #141b24 100%);
      border-radius: var(--r);
      padding: 14px;
    }
    .section-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .muted { color: var(--t2); }
    .tiny { font-size: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; }
    .cards { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; }
    .kpi {
      border-radius: 12px;
      border: 1px solid var(--b1);
      background: var(--bg2);
      padding: 14px;
      min-height: 98px;
    }
    .kpi.grn { background: linear-gradient(180deg, #10251b, #0d1f17); border-color: #174d35; }
    .kpi.red { background: linear-gradient(180deg, #2a1218, #221015); border-color: #542230; }
    .kpi.blu { background: linear-gradient(180deg, #101e31, #0d1929); border-color: #213b60; }
    .kpi.amb { background: linear-gradient(180deg, #2a1f10, #22190e); border-color: #5c4119; }
    .kpi-label { color: var(--t2); font-size: 12px; }
    .kpi-value { margin-top: 8px; font-size: 24px; font-weight: 600; }
    .kpi-sub { margin-top: 6px; color: var(--t2); font-size: 12px; }
    .btn {
      border: 1px solid var(--b2);
      background: #1a242f;
      color: var(--t1);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: .15s ease;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn.grn { background: linear-gradient(180deg, var(--grn), var(--grn2)); border-color: #0b8a56; color: #04190f; }
    .btn.red { background: linear-gradient(180deg, var(--red), var(--red2)); border-color: #851b30; }
    .btn.amb { background: linear-gradient(180deg, var(--amb), var(--amb2)); border-color: #8e5700; color: #241706; }
    .btn.blu { background: linear-gradient(180deg, var(--blu), #1f66cb); border-color: #17467f; }
    .btn.pur { background: linear-gradient(180deg, var(--pur), #6e45c1); border-color: #4a2d81; }
    .btn.ghost { background: transparent; }
    .btn.sm { font-size: 12px; border-radius: 8px; padding: 7px 10px; }
    .banner {
      border-radius: 12px;
      border: 1px solid var(--b1);
      padding: 12px;
      margin-bottom: 12px;
      background: var(--bg2);
    }
    .banner.red { border-color: #4f1a24; background: var(--rdbg); }
    .banner.grn { border-color: #1b4f37; background: var(--gnbg); }
    .banner.amb { border-color: #5d441a; background: var(--ambg); }
    .banner.blu { border-color: #1e3d63; background: var(--blbg); }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid var(--b1);
      border-radius: 10px;
      background: var(--bg2);
      padding: 10px;
    }
    .progress {
      height: 8px;
      border-radius: 999px;
      border: 1px solid var(--b1);
      background: #0f141b;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--amb), var(--grn));
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.grn { color: #73f0be; border-color: #206144; background: #0b2419; }
    .badge.red { color: #ff8ca2; border-color: #672534; background: #2a1118; }
    .badge.amb { color: #ffd18d; border-color: #6f4f1e; background: #2e220f; }
    .badge.blu { color: #94bbff; border-color: #2a4f83; background: #101d30; }
    .badge.pur { color: #c8afff; border-color: #4f3580; background: #1e1133; }
    .badge.gray { color: var(--t2); border-color: var(--b2); background: #182029; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--b1);
      border-radius: 12px;
      background: #131920;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--b1);
      vertical-align: top;
    }
    th {
      color: var(--t2);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .2px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--b2);
      background: #0f141b;
      color: var(--t1);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #3a4f67;
      box-shadow: 0 0 0 3px rgba(48, 128, 240, .15);
    }
    textarea { min-height: 86px; resize: vertical; }
    .field { display: grid; gap: 6px; }
    .field > label { color: var(--t2); font-size: 12px; font-weight: 600; }
    .form-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
    .form-grid-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; }
    .amount-input { font-size: 28px; font-weight: 600; letter-spacing: .3px; }
    .type-grid { display: grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap: 8px; margin-bottom: 12px; }
    .type-btn {
      border: 1px solid var(--b2);
      background: #111820;
      color: var(--t2);
      border-radius: 11px;
      padding: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: .15s;
    }
    .type-btn.active { color: var(--t1); }
    .type-btn.ingreso.active { border-color: #216146; background: #10261b; }
    .type-btn.egreso.active { border-color: #6c2535; background: #261019; }
    .type-btn.pago_deuda.active { border-color: #7b5314; background: #2b1f0e; }
    .type-btn.por_cobrar.active { border-color: #285387; background: #102033; }
    .type-btn.capital.active { border-color: #4f357f; background: #1d1231; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 12px; }
    .tab {
      border: 1px solid var(--b2);
      background: #10161d;
      color: var(--t2);
      border-radius: 999px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }
    .tab.active { border-color: #3d526a; background: #15212d; color: var(--t1); }
    .empty {
      border: 1px dashed var(--b2);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      background: #121820;
    }
    .empty .ico { font-size: 28px; margin-bottom: 8px; }
    .account-card {
      border: 1px solid var(--b1);
      border-radius: 14px;
      background: linear-gradient(180deg, #18212b 0%, #141c24 100%);
      padding: 14px;
      display: grid;
      gap: 8px;
    }
    .small-list {
      border-top: 1px solid var(--b1);
      margin-top: 4px;
      padding-top: 8px;
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--t2);
    }
    .calendar {
      border: 1px solid var(--b1);
      border-radius: 12px;
      overflow: hidden;
      background: #111820;
    }
    .cal-head, .cal-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); }
    .cal-head div {
      text-align: center;
      padding: 8px;
      border-bottom: 1px solid var(--b1);
      border-right: 1px solid var(--b1);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--t2);
    }
    .cal-head div:last-child { border-right: 0; }
    .day {
      min-height: 95px;
      border-right: 1px solid var(--b1);
      border-bottom: 1px solid var(--b1);
      padding: 7px;
      display: grid;
      align-content: start;
      gap: 4px;
      background: #121922;
    }
    .day:nth-child(7n) { border-right: 0; }
    .day.blank { background: #0f141b; }
    .day.today { outline: 1px solid var(--grn); outline-offset: -1px; background: #122218; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blu); margin-top: 2px; }
    .pl-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
    .pl-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px dashed #25303c;
      font-size: 13px;
    }
    .pl-line.bold { font-weight: 800; border-bottom-style: solid; padding-top: 9px; }
    .result-box {
      margin-top: 10px;
      border: 1px solid var(--b2);
      border-radius: 12px;
      padding: 12px;
      background: #111922;
    }
    .bar-list { display: grid; gap: 8px; }
    .bar-row { display: grid; gap: 4px; }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid var(--b1);
      background: #0c1219;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: inherit; }
    .proj { display: grid; gap: 12px; }
    .proj-section {
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 12px;
      background: #131a23;
    }
    .hbars { display: grid; gap: 7px; }
    .hbar {
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    .hbar-track {
      height: 12px;
      border-radius: 999px;
      border: 1px solid var(--b1);
      background: #0e141b;
      overflow: hidden;
    }
    .hbar-fill { height: 100%; border-radius: inherit; }
    .setup-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      background: radial-gradient(1000px 500px at 90% -20%, #19314b 0%, transparent 55%), var(--bg);
    }
    .setup-card {
      width: min(540px, 100%);
      border: 1px solid var(--b1);
      border-radius: 16px;
      background: linear-gradient(180deg, #18212c 0%, #131a23 100%);
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    #toastZone {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: grid;
      gap: 8px;
      z-index: 60;
    }
    .toast {
      border: 1px solid var(--b2);
      background: #15202b;
      color: var(--t1);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 220px;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
      animation: toastPop .2s ease;
      font-size: 13px;
    }
    .toast.ok { border-color: #216146; background: #0f2219; }
    .toast.err { border-color: #6f2736; background: #281018; }
    .toast.warn { border-color: #72511d; background: #281d0d; }
    @keyframes toastPop {
      from { transform: translateY(6px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
      padding: 16px;
    }
    #modalOverlay.show { display: flex; }
    .modal-card {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      border: 1px solid var(--b1);
      border-radius: 14px;
      background: #141b24;
    }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--b1);
      background: #161f2a;
    }
    .modal-head h3 { margin: 0; font-size: 16px; }
    .modal-body { padding: 14px; }
    .xbtn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--b2);
      background: #1a242f;
      color: var(--t1);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .hidden { display: none !important; }

    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .cards { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .pl-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      :root { --sidebar-w: 56px; }
      .logo span:not(.logo-dot), .nav-label, .date-widget .txt { display: none; }
      .logo { justify-content: center; padding: 0; }
      .nav-item { justify-content: center; padding: 10px 0; }
      .date-widget { text-align: center; padding: 10px 4px; }
      .main { padding: 12px; }
      .type-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 640px) {
      .grid-4, .grid-3, .cards { grid-template-columns: 1fr; }
      .topbar { padding: 0 10px; }
      .top-title { font-size: 16px; }
      .hbar { grid-template-columns: 58px 1fr auto; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toastZone"></div>
  <div id="modalOverlay">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="xbtn" data-action="close-modal" type="button">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    // Repo de GitHub donde se guardan los datos (un JSON por usuario)
    const GH_OWNER = 'martinechavarriaurrea-sys';
    const GH_REPO  = 'ERP';
    const GH_BRANCH = 'main';

    function ghToken() { return localStorage.getItem(GH_TOKEN_LSKEY) || ''; }

    const STORAGE_BASE_KEY = 'erp_martin_abril2026';
    const SESSION_USER_KEY = `${STORAGE_BASE_KEY}__session_user`;

    const LEGACY_STORAGE_KEYS = ['erp_martin_abril2026', 'erp_v1', 'erp_v1_u1', 'erp_v1_u2', 'erp_personal_v1'];
    const USER_PROFILES = {
      martin: { id: 'martin', name: 'MARTIN', code: '1017924435', key: `${STORAGE_BASE_KEY}__martin` },
      david: { id: 'david', name: 'David', code: '1234', key: `${STORAGE_BASE_KEY}__david` }
    };
    const CONFIRM_MSG = '¿Estás seguro? Esta acción no se puede deshacer.';

    const ROUTES = [

      { id: 'cuentas', icon: '🏦', label: 'Cuentas' },

      { id: 'flujo', icon: '≋', label: 'Flujo de caja' },
      { id: 'estado', icon: '◈', label: 'Estado de resultados' },
      { id: 'proyeccion', icon: '⟆', label: 'Proyección' },
      { id: 'acumulado', icon: '⊕', label: 'Acumulado' },
      { id: 'config', icon: '⚙', label: 'Configuración' }
    ];

    const INCOME_CATEGORIES = ['Salario', 'Freelance', 'Ventas', 'Intereses', 'Cobro deuda', 'Otros'];
    const EXPENSE_CATEGORIES = ['Alimentación', 'Transporte', 'Arriendo', 'Servicios', 'Celular', 'Salud', 'Ropa', 'Entretenimiento', 'Suscripciones', 'Impuestos', 'Otros'];
    const PAYMENT_METHODS = ['Débito', 'Efectivo', 'Tarjeta'];
    const DEBT_PAYMENT_TYPES = ['Cuota regular', 'Abono extra', 'Pago total'];
    const ACCOUNT_TYPES = ['Corriente', 'Ahorro', 'Digital', 'CDT', 'Inversión', 'Efectivo'];

    const TYPE_META = {
      ingreso: { label: 'Ingreso', badge: 'grn' },
      egreso: { label: 'Egreso', badge: 'red' },
      pago_deuda: { label: 'Pago deuda', badge: 'amb' },
      por_cobrar: { label: 'Por cobrar', badge: 'blu' },
      capital: { label: 'Capital', badge: 'pur' }
    };

    const DEFAULT_STATE = {
      movimientos: [],
      deudas: [],
      cobrar: [],
      cuentas: [],
      historial: [],
      proyeccion: {
        ingreso_mensual: 0,
        disponible_deuda: 0,
        gasto_fijo_mensual: 0,
        ahorro_mensual: 0,
        inversion_mensual: 0
      },
      config: {
        nombre: '',
        deuda_inicial_total: 0,
        ingreso_mensual: 0,
        ultimo_cambio_at: ''
      },

    };

    const app = document.getElementById('app');
    const toastZone = document.getElementById('toastZone');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');

    const moneyFormatter = new Intl.NumberFormat('es-CO', {
      style: 'currency',
      currency: 'COP',
      minimumFractionDigits: 0
    });

    let activeUserId = '';
    let activeStorageKey = '';
    let state = defaultState();
    let shellMounted = false;
    let lastSavedAt = null;

    const ui = {
      route: 'dashboard',
      registerType: 'ingreso',
      registerSearch: '',
      cobrarFilter: 'Todos',
      flowMonth: todayISO().slice(0, 7),

      acWeek: '',
      acMonth: todayISO().slice(0, 7),
      acYear: new Date().getFullYear(),
      acFrom: '',
      acTo: '',
      acResult: null
    };

    function cloneDefaultState() {
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }

    function defaultState() {
      return cloneDefaultState();
    }

    function toNumber(value) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      let clean = String(value ?? '').trim();
      if (!clean) return 0;

      clean = clean.replace(/\s+/g, '').replace(/\$/g, '');
      const hasDot = clean.includes('.');
      const hasComma = clean.includes(',');

      if (hasDot && hasComma) {
        if (clean.lastIndexOf(',') > clean.lastIndexOf('.')) {
          clean = clean.replace(/\./g, '').replace(',', '.');
        } else {
          clean = clean.replace(/,/g, '');
        }
      } else if (hasComma) {
        const parts = clean.split(',');
        if (parts.length === 2 && parts[1].length <= 2) {
          clean = `${parts[0].replace(/\./g, '')}.${parts[1]}`;
        } else {
          clean = clean.replace(/,/g, '');
        }
      } else if ((clean.match(/\./g) || []).length > 1) {
        clean = clean.replace(/\./g, '');
      }

      clean = clean.replace(/[^0-9.-]/g, '');
      const parsed = Number(clean);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function pad(v) {
      return String(v).padStart(2, '0');
    }

    function todayISO() {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function normalizeDate(iso) {
      const raw = String(iso ?? '').slice(0, 10);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return todayISO();
      return raw;
    }

    function formatDate(iso) {
      const d = normalizeDate(iso);
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function money(v) {
      return moneyFormatter.format(toNumber(v));
    }

    function monthKeyFrom(year, month) {
      return `${year}-${pad(month)}`;
    }

    function monthName(monthKey) {
      const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      const [yy, mm] = monthKey.split('-').map(Number);
      if (!yy || !mm) return monthKey;
      return `${months[mm - 1]} ${yy}`;
    }

    function shiftMonth(monthKey, delta) {
      const [yy, mm] = monthKey.split('-').map(Number);
      const d = new Date(yy, (mm - 1) + delta, 1);
      return monthKeyFrom(d.getFullYear(), d.getMonth() + 1);
    }

    function startEndOfMonth(monthKey) {
      const [yy, mm] = monthKey.split('-').map(Number);
      const lastDay = new Date(yy, mm, 0).getDate();
      return {
        from: `${yy}-${pad(mm)}-01`,
        to: `${yy}-${pad(mm)}-${pad(lastDay)}`
      };
    }

    function monthlyRateEA(tasaEA) {
      return Math.pow(1 + toNumber(tasaEA) / 100, 1 / 12) - 1;
    }

    function normalizeColor(color) {
      const c = String(color ?? '').toLowerCase();
      const map = {
        blu: 'azul',
        grn: 'verde',
        pur: 'morado',
        amb: 'amarillo',
        red: 'rojo',
        azul: 'azul',
        verde: 'verde',
        morado: 'morado',
        amarillo: 'amarillo',
        rojo: 'rojo'
      };
      return map[c] || 'azul';
    }

    function colorStyle(color) {
      const map = {
        azul: 'var(--blu)',
        verde: 'var(--grn)',
        morado: 'var(--pur)',
        amarillo: 'var(--amb)',
        rojo: 'var(--red)'
      };
      return map[normalizeColor(color)] || 'var(--blu)';
    }

    function normalizeTipo(tipo) {
      const t = String(tipo ?? '').toLowerCase();
      if (t === 'deuda') return 'pago_deuda';
      if (t === 'pago deuda') return 'pago_deuda';
      if (t === 'pago_deuda') return 'pago_deuda';
      if (t === 'ingreso') return 'ingreso';
      if (t === 'egreso') return 'egreso';
      if (t === 'capital') return 'capital';
      if (t === 'por cobrar' || t === 'por_cobrar') return 'por_cobrar';
      return 'egreso';
    }

    function normalizeCobrarState(estado, fechaVencimiento) {
      const clean = String(estado ?? '').toLowerCase();
      if (clean === 'cobrado') return 'cobrado';
      if (clean === 'vencido') return 'vencido';
      if (fechaVencimiento < todayISO()) return 'vencido';
      return 'pendiente';
    }

    function makeId(collection) {
      let id = Date.now();
      const used = new Set((collection || []).map((x) => String(x.id)));
      while (used.has(String(id))) id += 1;
      return id;
    }

    function safeParseState(raw) {
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function stateScore(raw) {
      const parsed = safeParseState(raw);
      if (!parsed || typeof parsed !== 'object') return 0;
      const a = Array.isArray(parsed.movimientos) ? parsed.movimientos.length : 0;
      const b = Array.isArray(parsed.deudas) ? parsed.deudas.length : 0;
      const c = Array.isArray(parsed.cobrar) ? parsed.cobrar.length : 0;
      const d = Array.isArray(parsed.cuentas) ? parsed.cuentas.length : 0;
      return a + b + c + d;
    }

    function getUserProfile(userId) {
      return USER_PROFILES[userId] || null;
    }

    function inferUserByCode(code) {
      const clean = String(code || '').trim();
      const profile = Object.values(USER_PROFILES).find((u) => u.code === clean);
      return profile ? profile.id : '';
    }

    function migrateLegacyStorageForUser(userId) {
      const profile = getUserProfile(userId);
      if (!profile) return;
      if (profile.id !== 'martin') return;
      const currentRaw = localStorage.getItem(profile.key);
      const currentScore = currentRaw ? stateScore(currentRaw) : 0;
      let bestRaw = currentRaw;
      let bestScore = currentScore;
      LEGACY_STORAGE_KEYS.forEach((key) => {
        if (key === profile.key) return;
        const raw = localStorage.getItem(key);
        if (!raw) return;
        const score = stateScore(raw);
        if (score > bestScore) {
          bestScore = score;
          bestRaw = raw;
        }
      });
      if (bestRaw && bestScore > currentScore) {
        localStorage.setItem(profile.key, bestRaw);
      }
    }

    function normalizeState(raw) {
      const base = cloneDefaultState();
      const src = raw && typeof raw === 'object' ? raw : {};
      const out = {
        ...base,
        ...src,
        proyeccion: { ...base.proyeccion, ...(src.proyeccion || {}) },
        config: { ...base.config, ...(src.config || {}) },
        mes_inicio: src.mes_inicio && typeof src.mes_inicio === 'object' ? { ...src.mes_inicio } : {}
      };

      const rawAccounts = Array.isArray(src.cuentas) ? src.cuentas : [];
      out.cuentas = rawAccounts.map((c, i) => ({
        id: c && c.id !== undefined ? c.id : makeId(rawAccounts) + i,
        nombre: String(c?.nombre || `Cuenta ${i + 1}`),
        tipo: String(c?.tipo || 'Corriente'),
        saldo: toNumber(c?.saldo ?? c?.saldo_actual ?? c?.saldo_inicial),
        color: normalizeColor(c?.color),
        notas: String(c?.notas || '')
      }));

      const accountByName = new Map(out.cuentas.map((c) => [String(c.nombre).trim().toLowerCase(), String(c.id)]));

      const rawDebts = Array.isArray(src.deudas) ? src.deudas : [];
      out.deudas = rawDebts.map((d, i) => {
        const id = d && d.id !== undefined ? d.id : makeId(rawDebts) + i;
        const saldo = toNumber(d?.saldo ?? d?.saldo_actual ?? d?.saldo_inicial);
        return {
          id,
          acreedor: String(d?.acreedor || `Deuda ${i + 1}`),
          saldo,
          saldo_inicial: toNumber(d?.saldo_inicial ?? d?.saldo_inicio_mes ?? saldo),
          cuota: toNumber(d?.cuota),
          tasa_ea: toNumber(d?.tasa_ea ?? d?.tasa),
          prox_pago: normalizeDate(d?.prox_pago ?? d?.fecha ?? todayISO()),
          notas: String(d?.notas || '')
        };
      });

      const debtByName = new Map(out.deudas.map((d) => [String(d.acreedor).trim().toLowerCase(), String(d.id)]));
      const debtIdSet = new Set(out.deudas.map((d) => String(d.id)));

      const rawMovements = Array.isArray(src.movimientos) ? src.movimientos : [];
      out.movimientos = rawMovements.map((m, i) => {
        const tipo = normalizeTipo(m?.tipo);
        const movimiento = {
          id: m && m.id !== undefined ? m.id : makeId(rawMovements) + i,
          tipo,
          fecha: normalizeDate(m?.fecha),
          monto: Math.abs(toNumber(m?.monto)),
          concepto: String(m?.concepto || TYPE_META[tipo]?.label || 'Movimiento'),
          categoria: String(m?.categoria || m?.cat || ''),
          notas: String(m?.notas || '')
        };

        const possibleAccount = String(m?.cuenta_id || '').trim()
          || accountByName.get(String(m?.cuenta || '').trim().toLowerCase())
          || accountByName.get(String(m?.dest || '').trim().toLowerCase())
          || accountByName.get(String(m?.cat || '').trim().toLowerCase())
          || '';

        if (['ingreso', 'egreso', 'capital', 'pago_deuda'].includes(tipo)) {
          movimiento.cuenta_id = possibleAccount;
        }

        if (tipo === 'egreso') {
          movimiento.medio_pago = String(m?.medio_pago || m?.dest || 'Débito');
        }

        if (tipo === 'capital') {
          movimiento.fuente = String(m?.fuente || m?.dest || '');
        }

        if (tipo === 'pago_deuda') {
          const deudaId = String(m?.deuda_id || '').trim() || debtByName.get(String(m?.cat || m?.categoria || '').trim().toLowerCase()) || '';
          movimiento.deuda_id = deudaId;
          movimiento.pago_tipo = String(m?.pago_tipo || m?.dest || 'Cuota regular');
          movimiento.categoria = movimiento.categoria || (deudaId ? (out.deudas.find((d) => String(d.id) === String(deudaId))?.acreedor || 'Deuda') : 'Deuda');
          if (!debtIdSet.has(String(deudaId))) movimiento.deuda_id = '';
        }

        if (tipo === 'por_cobrar') {
          movimiento.cobrar_id = m?.cobrar_id ? String(m.cobrar_id) : '';
          movimiento.deudor = String(m?.deudor || '');
          movimiento.fecha_vencimiento = normalizeDate(m?.fecha_vencimiento || m?.fecha);
          movimiento.categoria = movimiento.categoria || 'Por cobrar';
        }

        if (m?.cobro_id) movimiento.cobro_id = String(m.cobro_id);
        if (m?._debt_applied !== undefined) movimiento._debt_applied = toNumber(m._debt_applied);
        return movimiento;
      }).filter((m) => m.monto > 0);

      const rawCobrar = Array.isArray(src.cobrar) ? src.cobrar : [];
      out.cobrar = rawCobrar.map((c, i) => {
        const record = {
          id: c && c.id !== undefined ? c.id : makeId(rawCobrar) + i,
          deudor: String(c?.deudor || ''),
          monto: Math.abs(toNumber(c?.monto)),
          fecha_vencimiento: normalizeDate(c?.fecha_vencimiento || c?.fecha),
          estado: normalizeCobrarState(c?.estado, normalizeDate(c?.fecha_vencimiento || c?.fecha)),
          notas: String(c?.notas || ''),
          cuenta_id: String(c?.cuenta_id || ''),
          fecha_cobro: c?.fecha_cobro ? normalizeDate(c.fecha_cobro) : '',
          movimiento_id: c?.movimiento_id ? String(c.movimiento_id) : ''
        };
        return record;
      }).filter((c) => c.deudor && c.monto > 0);

      const fixedMesInicio = {};
      Object.entries(out.mes_inicio || {}).forEach(([mk, snap]) => {
        if (!snap || typeof snap !== 'object') return;
        const row = {};
        Object.entries(snap).forEach(([key, val]) => {
          const k = String(key);
          if (debtIdSet.has(k)) row[k] = toNumber(val);
          else {
            const byName = debtByName.get(k.trim().toLowerCase());
            if (byName) row[byName] = toNumber(val);
          }
        });
        if (Object.keys(row).length) fixedMesInicio[mk] = row;
      });

      const configStartMonth = String(out.config?.fecha_inicio_plan || '').slice(0, 7) || todayISO().slice(0, 7);
      out.deudas.forEach((d) => {
        const legacyStart = rawDebts.find((rd) => String(rd?.id) === String(d.id))?.saldo_inicio_mes;
        if (legacyStart !== undefined && legacyStart !== null) {
          if (!fixedMesInicio[configStartMonth]) fixedMesInicio[configStartMonth] = {};
          if (fixedMesInicio[configStartMonth][String(d.id)] === undefined) {
            fixedMesInicio[configStartMonth][String(d.id)] = toNumber(legacyStart);
          }
        }
      });

      out.mes_inicio = fixedMesInicio;
      return out;
    }

    function loadState() {
      if (!activeStorageKey) return defaultState();
      let S;
      try {
        S = JSON.parse(localStorage.getItem(activeStorageKey) || 'null') || defaultState();
      } catch {
        S = defaultState();
      }
      return normalizeState(S);
    }

    function persistState() {
      if (!activeStorageKey) return;
      const now = new Date().toISOString();
      localStorage.setItem(activeStorageKey, JSON.stringify(state));
      localStorage.setItem(activeStorageKey + '__ts', now);
      lastSavedAt = now;
      if (ghToken() && activeUserId) {
        clearTimeout(_ghSaveTimer);
        _ghSaveTimer = setTimeout(() => ghSave(activeUserId, now), 4000);
      }
    }

    function ghHeaders() {
      return {
        'Authorization': `Bearer ${ghToken()}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28'
      };
    }

    function ghPath(userId) {
      return `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/data/${userId}.json`;
    }

    async function ghLoad(userId) {
      if (!ghToken()) return null;
      try {
        const resp = await fetch(`${ghPath(userId)}?ref=${GH_BRANCH}`, { headers: ghHeaders() });
        if (resp.status === 404) return null;
        if (!resp.ok) throw new Error(`GitHub ${resp.status}`);
        const file = await resp.json();
        _ghSha[userId] = file.sha;
        return JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g, '')))));
      } catch (e) {
        console.warn('[ERP] ghLoad failed:', e.message);
        return null;
      }
    }

    async function ghSave(userId, timestamp) {
      if (!ghToken() || !userId) return;
      const payload = { data: JSON.stringify(state), saved_at: timestamp || new Date().toISOString() };
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      const body = {
        message: `erp: sync ${userId}`,
        content: encoded,
        branch: GH_BRANCH
      };
      if (_ghSha[userId]) body.sha = _ghSha[userId];
      try {
        const resp = await fetch(ghPath(userId), { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
        if (resp.status === 409 || resp.status === 422) {
          // SHA desactualizado — obtener el nuevo SHA y reintentar
          delete _ghSha[userId];
          const current = await ghLoad(userId);
          if (current) await ghSave(userId, timestamp);
          return;
        }
        if (!resp.ok) throw new Error(`GitHub ${resp.status}`);
        const result = await resp.json();
        if (result.content?.sha) _ghSha[userId] = result.content.sha;
      } catch (e) {
        console.warn('[ERP] ghSave failed:', e.message);
      }
    }

    async function ghSync(userId) {
      if (!ghToken() || !userId || !activeStorageKey) return;
      try {
        const cloud = await ghLoad(userId);
        if (!cloud) {
          const localTs = localStorage.getItem(activeStorageKey + '__ts');
          if (localTs) ghSave(userId, localTs);
          return;
        }
        let cloudState;
        try { cloudState = JSON.parse(cloud.data); } catch { return; }
        const localTs = localStorage.getItem(activeStorageKey + '__ts') || '';
        const cloudTs = cloud.saved_at || '';
        if (cloudTs > localTs) {
          state = normalizeState(cloudState);
          localStorage.setItem(activeStorageKey, JSON.stringify(state));
          localStorage.setItem(activeStorageKey + '__ts', cloudTs);
          lastSavedAt = cloudTs;
          if (!setupHasContent()) { renderSetup(); } else { ensureMonthSnapshot(); renderShell(); }
          showToast('Datos sincronizados desde GitHub');
        } else {
          ghSave(userId, localTs || new Date().toISOString());
        }
      } catch (e) {
        console.warn('[ERP] ghSync failed:', e.message);
      }
    }

    function ensureMonthSnapshot() {
      const mk = todayISO().slice(0, 7);
      if (!state.mes_inicio[mk]) {
        state.mes_inicio[mk] = {};
        state.deudas.forEach((d) => {
          state.mes_inicio[mk][String(d.id)] = toNumber(d.saldo);
        });
        persistState();
      }
    }

    function getDebtById(id) {
      return state.deudas.find((d) => String(d.id) === String(id));
    }

    function getAccountById(id) {
      return state.cuentas.find((c) => String(c.id) === String(id));
    }

    function accountName(id) {
      const c = getAccountById(id);
      return c ? c.nombre : '-';
    }

    function normalizeMovementType(m) {
      return normalizeTipo(m?.tipo);
    }

    function isIncomeMovement(m) {
      const t = normalizeMovementType(m);
      return t === 'ingreso' || t === 'capital';
    }

    function isExpenseMovement(m) {
      const t = normalizeMovementType(m);
      return t === 'egreso' || t === 'pago_deuda';
    }

    function movementSignedForAccount(m) {
      const amount = Math.abs(toNumber(m?.monto));
      const t = normalizeMovementType(m);
      if (t === 'ingreso' || t === 'capital') return amount;
      if (t === 'egreso' || t === 'pago_deuda') return -amount;
      return 0;
    }

    function applyMovementEffect(movement, direction = 1) {
      const amount = Math.abs(toNumber(movement?.monto));
      if (!amount) return;
      const type = normalizeMovementType(movement);
      const account = getAccountById(movement?.cuenta_id);

      if (account) {
        if (type === 'ingreso' || type === 'capital') {
          account.saldo = toNumber(account.saldo) + (direction * amount);
        }
        if (type === 'egreso' || type === 'pago_deuda') {
          account.saldo = toNumber(account.saldo) - (direction * amount);
        }
      }

      if (type === 'pago_deuda') {
        const debt = getDebtById(movement?.deuda_id);
        if (debt) {
          if (direction === 1) {
            const available = toNumber(debt.saldo);
            const applied = Math.min(available, amount);
            debt.saldo = Math.max(0, available - applied);
            movement._debt_applied = applied;
          } else {
            const applied = Math.abs(toNumber(movement._debt_applied || amount));
            debt.saldo = Math.max(0, toNumber(debt.saldo) + applied);
          }
        }
      }
    }

    function sortByDateDesc(list, field = 'fecha') {
      return [...list].sort((a, b) => {
        const d = String(b?.[field] || '').localeCompare(String(a?.[field] || ''));
        if (d !== 0) return d;
        return String(b?.id || '').localeCompare(String(a?.id || ''));
      });
    }

    function sortByDateAsc(list, field = 'fecha') {
      return [...list].sort((a, b) => {
        const d = String(a?.[field] || '').localeCompare(String(b?.[field] || ''));
        if (d !== 0) return d;
        return String(a?.id || '').localeCompare(String(b?.id || ''));
      });
    }

    function showToast(message, kind = 'ok') {
      const div = document.createElement('div');
      div.className = `toast ${kind}`;
      div.textContent = message;
      toastZone.appendChild(div);
      setTimeout(() => {
        div.style.opacity = '0';
        div.style.transform = 'translateY(8px)';
        setTimeout(() => div.remove(), 180);
      }, 2500);
    }

    function openModal(title, body) {
      modalTitle.textContent = title;
      modalBody.innerHTML = body;
      modalOverlay.classList.add('show');
      const first = modalBody.querySelector('input,select,textarea,button');
      if (first) first.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('show');
      modalBody.innerHTML = '';
    }

    function bindModalForm(formId, submitHandler) {
      const form = modalBody.querySelector(`#${formId}`);
      if (!form) return null;
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        event.stopPropagation();
        try {
          submitHandler(form);
        } catch (err) {
          console.error(err);
          showToast('Error al guardar. Intenta de nuevo.', 'err');
        }
      });
      return form;
    }

    function routeLabel(routeId) {
      return ROUTES.find((r) => r.id === routeId)?.label || '';
    }

    function typeBadge(type) {
      const meta = TYPE_META[normalizeMovementType({ tipo: type })] || { label: type, badge: 'gray' };
      return `<span class="badge ${meta.badge}">${escapeHtml(meta.label)}</span>`;
    }

    function emptyBlock(icon, title, desc, action = '', actionLabel = '', actionTarget = '') {
      return `
        <div class="empty">
          <div class="ico">${icon}</div>
          <div><strong>${escapeHtml(title)}</strong></div>
          <div class="tiny muted" style="margin-top:6px">${escapeHtml(desc)}</div>
          ${action ? `<div style="margin-top:10px"><button class="btn blu" data-action="${action}" ${actionTarget ? `data-target="${escapeHtml(actionTarget)}"` : ''}>${escapeHtml(actionLabel || 'Ir')}</button></div>` : ''}
        </div>
      `;
    }

    function accountOptions(selected = '') {
      const opts = state.cuentas.map((c) => `<option value="${escapeHtml(c.id)}" ${String(c.id) === String(selected) ? 'selected' : ''}>${escapeHtml(c.nombre)}</option>`).join('');
      return `<option value="">Seleccionar</option>${opts}`;

    function debtOptions(selected = '') {

    function activateUser(userId, persistSession = true) {
      const profile = getUserProfile(userId);
      if (!profile) return false;
      if (persistSession) sessionStorage.setItem(SESSION_USER_KEY, profile.id);
      localStorage.setItem(LAST_USER_KEY, profile.id);
      activeUserId = profile.id;
      activeStorageKey = profile.key;
      migrateLegacyStorageForUser(profile.id);
      state = loadState();
      ensureStateCollections();
      const saldosApplied = applyMartinRequestedBalances();
      ui.route = 'dashboard';
      ui.acResult = null;
      if (!setupHasContent()) {
        renderSetup();
      } else {
        ensureMonthSnapshot();
        renderShell();
      }
      if (saldosApplied) showToast('Saldos aplicados: Lulo $440.000 y Bancolombia $798.000');
      ghSync(profile.id);
      return true;
    }

    function switchUser() {
      persistState();
      sessionStorage.removeItem(SESSION_USER_KEY);
      localStorage.removeItem(LAST_USER_KEY);
      activeUserId = '';
      activeStorageKey = '';
      state = defaultState();
      ui.route = 'dashboard';
      ui.acResult = null;
      closeModal();
      renderAuth();
    }

    function applyMartinRequestedBalances() {
      if (activeUserId !== 'martin') return false;
      state.config = state.config || {};
      if (state.config.__saldos_fix_20260416) return false;
      if (!Array.isArray(state.cuentas)) state.cuentas = [];

      let changed = false;
      let foundLulo = false;
      let foundBancolombia = false;

      state.cuentas.forEach((cuenta) => {
        const nombre = String(cuenta?.nombre || '').toLowerCase();
        if (nombre.includes('lulo')) {
          foundLulo = true;
          if (toNumber(cuenta.saldo) !== 440000) {
            cuenta.saldo = 440000;
            changed = true;
          }
        }
        if (nombre.includes('bancolombia')) {
          foundBancolombia = true;
          if (toNumber(cuenta.saldo) !== 798000) {
            cuenta.saldo = 798000;
            changed = true;
          }
        }
      });

      if (!foundLulo) {
        state.cuentas.push({
          id: nextEntityId(state.cuentas),
          nombre: 'Lulo Bank',
          tipo: 'Digital',
          saldo: 440000,
          color: 'verde',
          notas: 'Saldo inicial solicitado'
        });
        changed = true;
      }

      if (!foundBancolombia) {
        state.cuentas.push({
          id: nextEntityId(state.cuentas),
          nombre: 'Bancolombia',
          tipo: 'Corriente',
          saldo: 798000,
          color: 'azul',
          notas: 'Saldo inicial solicitado'
        });
        changed = true;
      }

      state.config.__saldos_fix_20260416 = true;
      persistState();
      return changed;
    }

      if (route === 'estado') screen.innerHTML = renderEstado();
      if (route === 'proyeccion') screen.innerHTML = renderProyeccion();

      if (route === 'config') screen.innerHTML = renderConfig();

    function debtReductionMonth(deuda, monthKey = todayISO().slice(0, 7)) {
      const snap = state.mes_inicio[monthKey] || {};
      const start = toNumber(snap[String(deuda.id)]);
      if (!start) return 0;
      return start - toNumber(deuda.saldo);
    }

    function cobrarStatus(record) {
      if (String(record.estado).toLowerCase() === 'cobrado') return 'Cobrado';
      if (normalizeDate(record.fecha_vencimiento) < todayISO()) return 'Vencido';
      return 'Pendiente';
    }

    function dashboardMonthSummary(monthKey) {
      const moves = state.movimientos.filter((m) => normalizeDate(m.fecha).startsWith(monthKey));
      const ingresos = moves.filter(isIncomeMovement).reduce((s, m) => s + toNumber(m.monto), 0);
      const egresos = moves.filter(isExpenseMovement).reduce((s, m) => s + toNumber(m.monto), 0);
      return { ingresos, egresos, neto: ingresos - egresos };
    }

    function renderDashboard() {
      const monthKey = todayISO().slice(0, 7);
      const { ingresos, egresos, neto } = dashboardMonthSummary(monthKey);
      const deudaTotal = state.deudas.reduce((s, d) => s + toNumber(d.saldo), 0);
      const deudaInicial = toNumber(state.config.deuda_inicial_total);
      const pct = deudaInicial > 0 ? (deudaTotal / deudaInicial) * 100 : 0;
      const totalCuentas = state.cuentas.reduce((s, c) => s + toNumber(c.saldo), 0);

      const last5 = sortByDateDesc(state.movimientos).slice(0, 5);
      const next3Cobros = state.cobrar
        .filter((c) => cobrarStatus(c) !== 'Cobrado')
        .sort((a, b) => normalizeDate(a.fecha_vencimiento).localeCompare(normalizeDate(b.fecha_vencimiento)))
        .slice(0, 3);

      const deudaItems = state.deudas
        .slice()
        .sort((a, b) => toNumber(b.tasa_ea) - toNumber(a.tasa_ea))
        .map((d) => {
          const saldo = toNumber(d.saldo);
          const start = toNumber(d.saldo_inicial) || saldo;
          const progress = start > 0 ? Math.max(0, Math.min(100, ((start - saldo) / start) * 100)) : 0;
          const red = debtReductionMonth(d, monthKey);
          return `
            <div class="item">
              <div class="row">
                <strong>${escapeHtml(d.acreedor)}</strong>
                <span class="num">${money(saldo)}</span>
              </div>
              <div class="progress" style="margin:8px 0 6px"><span style="width:${progress}%"></span></div>
              <div class="tiny muted">Reducción este mes: <span class="num" style="color:${red >= 0 ? 'var(--grn)' : 'var(--red)'}">${money(red)}</span></div>
            </div>
          `;
        }).join('');

      const monday = new Date().getDay() === 1;
      const reductionMonth = state.deudas.reduce((s, d) => s + debtReductionMonth(d, monthKey), 0);
      const nextCobro = next3Cobros[0];

      return `
        ${monday ? `
          <div class="banner grn">
            <strong>Lunes financiero</strong>
            <div class="tiny" style="margin-top:6px">
              Deuda total: <span class="num">${money(deudaTotal)}</span> ·
              Reducción del mes: <span class="num">${money(reductionMonth)}</span> ·
              Próximo cobro: <span class="num">${nextCobro ? `${escapeHtml(nextCobro.deudor)} (${formatDate(nextCobro.fecha_vencimiento)})` : 'Sin cobros'}</span> ·
              Saldo cuentas: <span class="num">${money(totalCuentas)}</span>
            </div>
          </div>
        ` : ''}

        <div class="grid-4">
          <div class="kpi grn"><div class="kpi-label">Ingresos del mes</div><div class="kpi-value num">${money(ingresos)}</div></div>
          <div class="kpi red"><div class="kpi-label">Egresos del mes</div><div class="kpi-value num">${money(egresos)}</div></div>
          <div class="kpi ${neto >= 0 ? 'blu' : 'red'}"><div class="kpi-label">Saldo neto</div><div class="kpi-value num">${money(neto)}</div></div>
          <div class="kpi amb"><div class="kpi-label">Deuda total</div><div class="kpi-value num">${money(deudaTotal)}</div><div class="kpi-sub">${deudaInicial ? `${pct.toFixed(1)}% de ${money(deudaInicial)}` : 'Sin deuda inicial'}</div></div>
        </div>

        <div class="grid-3" style="margin-top:12px">
          <section class="panel">
            <h3 class="section-title">Deudas</h3>
            ${state.deudas.length ? `<div class="list">${deudaItems}</div>` : emptyBlock('↗', 'Sin deudas', 'Agrega tu primera deuda en Por pagar', 'goto-route', 'Ir a Por pagar', 'pagar')}
          </section>

          <section class="panel">
            <h3 class="section-title">Últimos 5 movimientos</h3>
            ${last5.length ? `<div class="list">${last5.map((m) => `
              <div class="item">
                <div class="row">
                  ${typeBadge(m.tipo)}
                  <span class="tiny muted">${formatDate(m.fecha)}</span>
                </div>
                <div style="margin-top:4px">${escapeHtml(m.concepto || '-')}</div>
                <div class="row" style="margin-top:4px">
                  <span class="tiny muted">${escapeHtml(m.categoria || '-')}</span>
                  <span class="num" style="color:${isIncomeMovement(m) ? 'var(--grn)' : isExpenseMovement(m) ? 'var(--red)' : 'var(--t1)'}">${money(m.monto)}</span>

              <div class="item">

                <div class="tiny muted" style="margin-top:4px">${formatDate(c.fecha_vencimiento)} · ${cobrarStatus(c)}</div>
              </div>
            `).join('')}</div>` : emptyBlock('↙', 'Sin cobros pendientes', 'Agrega tu primer cobro', 'goto-route', 'Ir a Por cobrar', 'cobrar')}
          </section>
        </div>
      `;
    }

            </div>
          </div>
        `;
      }).join('');

      const consolidatedRows = state.cuentas.map((c) => {
        const moves = state.movimientos.filter((m) => String(m.cuenta_id) === String(c.id));
        const ingresos = moves.filter(isIncomeMovement).reduce((s, m) => s + toNumber(m.monto), 0);

        .filter((x) => cobrarStatus(x) !== 'Cobrado')

      const filtered = list.filter((x) => {
        const st = cobrarStatus(x);
        if (ui.cobrarFilter === 'Todos') return true;
        if (ui.cobrarFilter === 'Pendientes') return st === 'Pendiente';
        if (ui.cobrarFilter === 'Cobrados') return st === 'Cobrado';
        if (ui.cobrarFilter === 'Vencidos') return st === 'Vencido';
        return true;
      }).sort((a, b) => normalizeDate(a.fecha_vencimiento).localeCompare(normalizeDate(b.fecha_vencimiento)));

      return `

          <div class="kpi blu"><div class="kpi-label">Total cobrado</div><div class="kpi-value num">${money(collectedTotal)}</div></div>

          </div>

        ${list.length ? `

              <tbody>
                ${filtered.map((c) => {
                  const st = cobrarStatus(c);
                  const days = Math.floor((new Date(normalizeDate(c.fecha_vencimiento)).setHours(0,0,0,0) - new Date(todayISO()).setHours(0,0,0,0)) / 86400000);
                  const badge = st === 'Cobrado' ? 'grn' : st === 'Vencido' ? 'red' : 'amb';

                    <tr>
                      <td>${escapeHtml(c.deudor)}</td>

                      <td>${formatDate(c.fecha_vencimiento)}</td>
                      <td class="num" style="color:${days < 0 ? 'var(--red)' : 'var(--t1)'}">${days < 0 ? `Vencido ${Math.abs(days)}d` : `${days}d`}</td>
                      <td><span class="badge ${badge}">${st}</span></td>
                      <td>
                        <div class="actions">
                          ${st !== 'Cobrado' ? `<button class="btn sm grn" data-action="cobrar-item" data-id="${escapeHtml(c.id)}" type="button">Cobrar</button>` : ''}
                          <button class="btn sm ghost" data-action="edit-cobrar" data-id="${escapeHtml(c.id)}" type="button">Editar</button>
                          <button class="btn sm red" data-action="delete-cobrar" data-id="${escapeHtml(c.id)}" type="button">Eliminar</button>

    function renderPagar() {

    function renderFlujo() {
      const mk = ui.flowMonth;
      const [yy, mm] = mk.split('-').map(Number);
      const rows = sortByDateAsc(state.movimientos.filter((m) => normalizeDate(m.fecha).startsWith(mk)));
      const entradas = rows.filter(isIncomeMovement).reduce((s, m) => s + toNumber(m.monto), 0);
      const salidas = rows.filter(isExpenseMovement).reduce((s, m) => s + toNumber(m.monto), 0);
      const balance = entradas - salidas;

      const first = new Date(yy, mm - 1, 1);
      const offset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const days = new Date(yy, mm, 0).getDate();
      const cells = [];
      for (let i = 0; i < offset; i += 1) cells.push('<div class="day blank"></div>');
      for (let d = 1; d <= days; d += 1) {
        const iso = `${yy}-${pad(mm)}-${pad(d)}`;
        const dayMoves = rows.filter((m) => normalizeDate(m.fecha) === iso);
        const inc = dayMoves.filter(isIncomeMovement).reduce((s, m) => s + toNumber(m.monto), 0);
        const exp = dayMoves.filter(isExpenseMovement).reduce((s, m) => s + toNumber(m.monto), 0);
        const todayClass = iso === todayISO() ? 'today' : '';
        cells.push(`
          <div class="day ${todayClass}">
            <div class="num">${d}</div>
            ${inc ? `<div class="tiny" style="color:var(--grn)">${money(inc)}</div>` : ''}
            ${exp ? `<div class="tiny" style="color:var(--red)">${money(exp)}</div>` : ''}
            ${dayMoves.length ? '<div class="dot"></div>' : ''}
          </div>
        `);
      }
      while (cells.length % 7 !== 0) cells.push('<div class="day blank"></div>');

      let run = 0;
      const rowsHtml = rows.map((m) => {
        const en = isIncomeMovement(m) ? toNumber(m.monto) : 0;
        const sa = isExpenseMovement(m) ? toNumber(m.monto) : 0;
        run += (en - sa);
        return `
          <tr>
            <td>${formatDate(m.fecha)}</td>
            <td>${escapeHtml(m.concepto || '-')}</td>
            <td>${typeBadge(m.tipo)}</td>
            <td class="num" style="color:var(--grn)">${en ? money(en) : '-'}</td>
            <td class="num" style="color:var(--red)">${sa ? money(sa) : '-'}</td>
            <td class="num">${money(run)}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="grid-3" style="margin-bottom:12px">
          <div class="kpi grn"><div class="kpi-label">Entradas mes</div><div class="kpi-value num">${money(entradas)}</div></div>
          <div class="kpi red"><div class="kpi-label">Salidas mes</div><div class="kpi-value num">${money(salidas)}</div></div>
          <div class="kpi blu"><div class="kpi-label">Balance</div><div class="kpi-value num">${money(balance)}</div></div>
        </div>

        <div class="row" style="margin-bottom:10px">
          <div class="actions">
            <button class="btn sm ghost" data-action="flow-prev" type="button">◀</button>
            <strong>${monthName(mk)}</strong>
            <button class="btn sm ghost" data-action="flow-next" type="button">▶</button>
          </div>
        </div>

        <div class="calendar">
          <div class="cal-head"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div>
          <div class="cal-grid">${cells.join('')}</div>
        </div>

        <section class="panel" style="margin-top:12px">
          <h3 class="section-title">Movimientos del mes</h3>
          ${rows.length ? `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Fecha</th><th>Concepto</th><th>Tipo</th><th>Entrada</th><th>Salida</th><th>Saldo acumulado</th></tr></thead>
                <tbody>
                  ${rowsHtml}
                  <tr>
                    <td colspan="3"><strong>Total</strong></td>
                    <td class="num" style="color:var(--grn)"><strong>${money(entradas)}</strong></td>
                    <td class="num" style="color:var(--red)"><strong>${money(salidas)}</strong></td>
                    <td class="num"><strong>${money(balance)}</strong></td>
                  </tr>
                </tbody>
              </table>
            </div>
          ` : emptyBlock('≋', 'Sin movimientos en el mes', 'Registra ingresos o egresos para ver flujo.')}
        </section>
      `;
    }

    function buildPL(movs) {
      const ingresosByCat = {};
      const egresosByCat = {};

      movs.forEach((m) => {
        const type = normalizeMovementType(m);
        if (type === 'ingreso' || type === 'capital') {
          const cat = m.categoria || (type === 'capital' ? 'Capital' : 'Otros');
          ingresosByCat[cat] = (ingresosByCat[cat] || 0) + toNumber(m.monto);
        }
        if (type === 'egreso' || type === 'pago_deuda') {
          const cat = m.categoria || (type === 'pago_deuda' ? 'Pago deuda' : 'Otros');
          egresosByCat[cat] = (egresosByCat[cat] || 0) + toNumber(m.monto);
        }
      });

      const ingresos = Object.values(ingresosByCat).reduce((s, v) => s + v, 0);
      const egresos = Object.values(egresosByCat).reduce((s, v) => s + v, 0);
      return { ingresosByCat, egresosByCat, ingresos, egresos, neto: ingresos - egresos };
    }

    function renderEstado() {
      const mk = monthKeyFrom(ui.estadoYear, ui.estadoMonth);
      const monthMoves = state.movimientos.filter((m) => normalizeDate(m.fecha).startsWith(mk));
      const pl = buildPL(monthMoves);
      const margin = pl.ingresos > 0 ? (pl.neto / pl.ingresos) * 100 : 0;

      const yearSet = new Set([new Date().getFullYear()]);
      state.movimientos.forEach((m) => yearSet.add(Number(String(m.fecha || '').slice(0, 4))));
      const years = [...yearSet].filter((y) => Number.isFinite(y)).sort((a, b) => b - a);

      const comp = [];
      for (let i = 5; i >= 0; i -= 1) {
        const mKey = shiftMonth(mk, -i);
        const moves = state.movimientos.filter((m) => normalizeDate(m.fecha).startsWith(mKey));
        const row = buildPL(moves);
        comp.push({ mKey, ingresos: row.ingresos, egresos: row.egresos, neto: row.neto });
      }

      const ingTotal = Object.values(pl.ingresosByCat).reduce((s, v) => s + v, 0);
      const egTotal = Object.values(pl.egresosByCat).reduce((s, v) => s + v, 0);

      return `
        <div class="row" style="margin-bottom:10px">
          <div class="actions">
            <select data-action="estado-month">
              ${Array.from({ length: 12 }, (_, i) => `<option value="${i + 1}" ${ui.estadoMonth === i + 1 ? 'selected' : ''}>${i + 1}</option>`).join('')}
            </select>
            <select data-action="estado-year">
              ${years.map((y) => `<option value="${y}" ${ui.estadoYear === y ? 'selected' : ''}>${y}</option>`).join('')}
            </select>
          </div>
          <strong>${monthName(mk)}</strong>
        </div>

        <div class="pl-layout">
          <section class="panel">
            <h3 class="section-title">Estado de resultados</h3>
            <div class="pl-line"><span>Ingresos por categoría</span><span></span></div>
            ${Object.entries(pl.ingresosByCat).map(([k, v]) => `<div class="pl-line"><span>${escapeHtml(k)}</span><span class="num">${money(v)}</span></div>`).join('') || '<div class="pl-line"><span class="muted">Sin ingresos</span><span>-</span></div>'}
            <div class="pl-line bold" style="color:var(--grn)"><span>Total ingresos</span><span class="num">${money(pl.ingresos)}</span></div>

            <div class="pl-line" style="margin-top:8px"><span>Egresos por categoría</span><span></span></div>
            ${Object.entries(pl.egresosByCat).map(([k, v]) => `<div class="pl-line"><span>${escapeHtml(k)}</span><span class="num">${money(v)}</span></div>`).join('') || '<div class="pl-line"><span class="muted">Sin egresos</span><span>-</span></div>'}
            <div class="pl-line bold" style="color:var(--red)"><span>Total egresos</span><span class="num">${money(pl.egresos)}</span></div>

            <div class="result-box">
              <div class="row"><strong>Resultado neto</strong><span class="num" style="color:${pl.neto >= 0 ? 'var(--grn)' : 'var(--red)'}">${money(pl.neto)}</span></div>
              <div class="tiny muted" style="margin-top:6px">Margen: <span class="num">${margin.toFixed(2)}%</span> · ${pl.neto >= 0 ? 'Superávit' : 'Déficit'}</div>
            </div>
          </section>

          <section class="panel">
            <h3 class="section-title">Distribución</h3>
            <div class="tiny muted">Ingresos por categoría</div>
            <div class="bar-list" style="margin-top:8px">
              ${Object.entries(pl.ingresosByCat).map(([k, v]) => {
                const pct = ingTotal > 0 ? (v / ingTotal) * 100 : 0;
                return `<div class="bar-row"><div class="row tiny"><span>${escapeHtml(k)}</span><span class="num">${pct.toFixed(1)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--grn)"></div></div></div>`;
              }).join('') || '<div class="tiny muted">Sin datos</div>'}
            </div>

            <div class="tiny muted" style="margin-top:12px">Egresos por categoría</div>
            <div class="bar-list" style="margin-top:8px">
              ${Object.entries(pl.egresosByCat).map(([k, v]) => {
                const pct = egTotal > 0 ? (v / egTotal) * 100 : 0;
                return `<div class="bar-row"><div class="row tiny"><span>${escapeHtml(k)}</span><span class="num">${pct.toFixed(1)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--red)"></div></div></div>`;
              }).join('') || '<div class="tiny muted">Sin datos</div>'}
            </div>

            <div class="section-title" style="margin-top:14px">Comparativo 6 meses</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Mes</th><th>Ingresos</th><th>Egresos</th><th>Resultado</th><th>Tendencia</th></tr></thead>
                <tbody>
                  ${comp.map((r, idx) => {
                    const prev = idx > 0 ? comp[idx - 1].neto : r.neto;
                    return `<tr><td>${monthName(r.mKey)}</td><td class="num">${money(r.ingresos)}</td><td class="num">${money(r.egresos)}</td><td class="num" style="color:${r.neto >= 0 ? 'var(--grn)' : 'var(--red)'}">${money(r.neto)}</td><td>${r.neto >= prev ? '↗' : '↘'}</td></tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </section>
        </div>
      `;
    }

    function projectionData() {
      const p = state.proyeccion;
      const ingreso = toNumber(p.ingreso_mensual);
      const disponible = toNumber(p.disponible_deuda);
      const gasto = toNumber(p.gasto_fijo_mensual);
      const ahorro = toNumber(p.ahorro_mensual);
      const inversion = toNumber(p.inversion_mensual);

      const labels = [];
      let cursor = todayISO().slice(0, 7);
      for (let i = 0; i < 12; i += 1) {
        labels.push(cursor);
        cursor = shiftMonth(cursor, 1);
      }

      const debts = state.deudas
        .filter((d) => toNumber(d.saldo) > 0)
        .map((d) => ({
          id: d.id,
          acreedor: d.acreedor,
          tasa: toNumber(d.tasa_ea),
          cuota: toNumber(d.cuota),
          saldo: toNumber(d.saldo),
          zeroMonth: null
        }))
        .sort((a, b) => b.tasa - a.tasa);

      const debtSeries = [];
      for (let i = 0; i < 12; i += 1) {
        debts.forEach((d) => {
          if (d.saldo <= 0) return;
          d.saldo *= (1 + monthlyRateEA(d.tasa));
        });

        let budget = disponible;
        debts.forEach((d) => {
          if (d.saldo <= 0 || budget <= 0) return;
          const minPay = Math.min(d.saldo, d.cuota > 0 ? d.cuota : 0);
          const pay = Math.min(minPay, budget);
          d.saldo -= pay;
          budget -= pay;
          if (d.saldo <= 0 && d.zeroMonth === null) d.zeroMonth = i;
        });

        while (budget > 0) {
          const target = debts.filter((d) => d.saldo > 0).sort((a, b) => b.tasa - a.tasa)[0];
          if (!target) break;
          const pay = Math.min(target.saldo, budget);
          target.saldo -= pay;
          budget -= pay;
          if (target.saldo <= 0 && target.zeroMonth === null) target.zeroMonth = i;
        }

        const total = debts.reduce((s, d) => s + Math.max(0, d.saldo), 0);
        debtSeries.push(total);
      }

      let ahorroAc = 0;
      const ahorroSeries = labels.map(() => {
        ahorroAc += ahorro;
        return ahorroAc;
      });

      let invAc = 0;
      const invRate = monthlyRateEA(12);
      const inversionSeries = labels.map(() => {
        invAc = (invAc + inversion) * (1 + invRate);
        return invAc;
      });

      const gastoSeries = labels.map(() => gasto);
      const milestones = debts.filter((d) => d.zeroMonth !== null).map((d) => ({ debt: d.acreedor, idx: d.zeroMonth }));

      return {
        labels,
        ingreso,
        deuda: debtSeries,
        gastos: gastoSeries,
        ahorro: ahorroSeries,
        inversion: inversionSeries,
        milestones
      };
    }

    function renderProyeccion() {
      const p = state.proyeccion;
      const sim = projectionData();
      const debtMax = Math.max(...sim.deuda, 1);
      const ahorroMax = Math.max(...sim.ahorro, 1);
      const invMax = Math.max(...sim.inversion, 1);
      const gastoPct = sim.ingreso > 0 ? Math.min(100, (toNumber(p.gasto_fijo_mensual) / sim.ingreso) * 100) : 0;

      const debtBars = state.deudas.length
        ? sim.labels.map((m, i) => {
          const value = sim.deuda[i];
          const width = (value / debtMax) * 100;
          const hue = 0 + (120 * (i / 11));
          return `<div class="hbar"><div>${monthName(m).slice(0,3)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${width}%;background:hsl(${hue},80%,52%)"></div></div><div class="num">${money(value)}</div></div>`;
        }).join('')
        : '<div class="muted">Agrega tus deudas en Por Pagar para ver la proyección</div>';

      const gastosBars = sim.labels.map((m) => `<div class="hbar"><div>${monthName(m).slice(0,3)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${gastoPct}%;background:var(--amb)"></div></div><div class="num">${money(p.gasto_fijo_mensual)}</div></div>`).join('');
      const ahorroBars = sim.labels.map((m, i) => `<div class="hbar"><div>${monthName(m).slice(0,3)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${(sim.ahorro[i] / ahorroMax) * 100}%;background:var(--grn)"></div></div><div class="num">${money(sim.ahorro[i])}</div></div>`).join('');
      const inversionBars = sim.labels.map((m, i) => `<div class="hbar"><div>${monthName(m).slice(0,3)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${(sim.inversion[i] / invMax) * 100}%;background:var(--pur)"></div></div><div class="num">${money(sim.inversion[i])}</div></div>`).join('');

    function acumuladoRange() {
      if (ui.acMode === 'semana') {
        if (!ui.acWeek) return null;
        const [yyS, wwS] = ui.acWeek.split('-W');
        const yy = Number(yyS);
        const ww = Number(wwS);
        if (!yy || !ww) return null;
        const jan4 = new Date(yy, 0, 4);
        const jan4Day = jan4.getDay() || 7;
        const monday1 = new Date(jan4);
        monday1.setDate(jan4.getDate() - jan4Day + 1);
        const monday = new Date(monday1);
        monday.setDate(monday1.getDate() + (ww - 1) * 7);
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        const from = `${monday.getFullYear()}-${pad(monday.getMonth() + 1)}-${pad(monday.getDate())}`;
        const to = `${sunday.getFullYear()}-${pad(sunday.getMonth() + 1)}-${pad(sunday.getDate())}`;
        return { from, to, label: `Semana ${ww} - ${yy}` };
      }
      if (ui.acMode === 'mes') {
        if (!ui.acMonth) return null;
        const range = startEndOfMonth(ui.acMonth);
        return { from: range.from, to: range.to, label: monthName(ui.acMonth) };
      }
      if (ui.acMode === 'anio') {
        const yy = Number(ui.acYear);
        if (!yy) return null;
        return { from: `${yy}-01-01`, to: `${yy}-12-31`, label: `Año ${yy}` };
      }
      if (!ui.acFrom || !ui.acTo) return null;
      return { from: normalizeDate(ui.acFrom), to: normalizeDate(ui.acTo), label: `${formatDate(ui.acFrom)} - ${formatDate(ui.acTo)}` };
    }

    function ensureStateCollections() {
      if (!Array.isArray(state.movimientos)) state.movimientos = [];
      if (!Array.isArray(state.deudas)) state.deudas = [];
      if (!Array.isArray(state.cobrar)) state.cobrar = [];
      if (!Array.isArray(state.cuentas)) state.cuentas = [];
      if (!state.proyeccion || typeof state.proyeccion !== 'object') state.proyeccion = { ...DEFAULT_STATE.proyeccion };
      else state.proyeccion = { ...DEFAULT_STATE.proyeccion, ...state.proyeccion };
      if (!state.config || typeof state.config !== 'object') state.config = { ...DEFAULT_STATE.config };
      else state.config = { ...DEFAULT_STATE.config, ...state.config };
      if (!state.mes_inicio || typeof state.mes_inicio !== 'object') state.mes_inicio = {};
    }

    function nextEntityId(list) {
      let id = Date.now();
      const set = new Set((list || []).map((x) => String(x?.id)));
      while (set.has(String(id))) id += 1;
      return id;
    }

    function readForm(form) {
      const out = {};
      new FormData(form).forEach((val, key) => {
        out[key] = String(val ?? '').trim();
      });
      return out;
    }

    function movementById(id) {
      return state.movimientos.find((m) => String(m.id) === String(id));
    }

    function cobrarById(id) {
      return state.cobrar.find((c) => String(c.id) === String(id));
    }

    function debtNameById(id) {
      return getDebtById(id)?.acreedor || '';
    }

    function buildMovementPayload(data, forcedId = null) {
      const tipo = normalizeTipo(data.tipo || 'ingreso');
      const monto = Math.abs(toNumber(data.monto));
      const base = {
        id: forcedId ?? nextEntityId(state.movimientos),
        tipo,
        fecha: normalizeDate(data.fecha || todayISO()),
        monto,
        concepto: String(data.concepto || TYPE_META[tipo]?.label || 'Movimiento'),
        categoria: String(data.categoria || ''),
        notas: String(data.notas || '')
      };

      if (tipo === 'ingreso') {
        base.cuenta_id = String(data.cuenta_id || '');
        base.categoria = base.categoria || 'Otros';
      }

      if (tipo === 'egreso') {
        base.cuenta_id = String(data.cuenta_id || '');
        base.medio_pago = String(data.medio_pago || 'Débito');
        base.categoria = base.categoria || 'Otros';
      }

      if (tipo === 'capital') {
        base.cuenta_id = String(data.cuenta_id || '');
        base.fuente = String(data.fuente || '');
        base.categoria = base.categoria || 'Capital';
      }

      if (tipo === 'pago_deuda') {
        base.deuda_id = String(data.deuda_id || '');
        base.cuenta_id = String(data.cuenta_id || '');
        base.pago_tipo = String(data.pago_tipo || 'Cuota regular');
        base.categoria = base.categoria || debtNameById(base.deuda_id) || 'Deuda';
      }

      if (tipo === 'por_cobrar') {
        base.deudor = String(data.deudor || data.concepto || 'Sin deudor');
        base.fecha_vencimiento = normalizeDate(data.fecha_vencimiento || data.fecha || todayISO());
        base.categoria = 'Por cobrar';
      }

      return base;
    }

    function validateMovementPayload(movement) {
      if (!movement || !movement.monto || movement.monto <= 0) return 'Ingresa un monto válido.';
      const type = normalizeTipo(movement.tipo);
      if ((type === 'ingreso' || type === 'egreso' || type === 'capital') && !String(movement.cuenta_id || '').trim()) {
        return 'Selecciona una cuenta.';
      }
      if (type === 'pago_deuda') {
        if (!String(movement.deuda_id || '').trim()) return 'Selecciona una deuda.';
        if (!String(movement.cuenta_id || '').trim()) return 'Selecciona una cuenta de origen.';
      }
      if (type === 'por_cobrar' && !String(movement.deudor || '').trim()) return 'Ingresa el deudor.';
      return '';
    }

    function deleteCobrarRecord(cobrarId, options = {}) {
      const opts = {
        removeIngresoMovement: true,
        removeRegistroMovement: true,
        skipMovementId: '',
        ...options
      };
      const c = cobrarById(cobrarId);
      if (!c) return;

      if (opts.removeIngresoMovement && c.movimiento_id) {
        const m = movementById(c.movimiento_id);
        if (m && String(m.id) !== String(opts.skipMovementId)) {
          removeMovementInternal(m, {
            keepArray: false,
            deleteLinkedCobrar: false,
            revertCobro: false
          });
        }
      }

      if (opts.removeRegistroMovement) {
        let linked = state.movimientos.find((m) => String(m.cobrar_id || '') === String(cobrarId) && String(m.id) !== String(opts.skipMovementId));
        while (linked) {
          removeMovementInternal(linked, {
            keepArray: false,
            deleteLinkedCobrar: false,
            revertCobro: false
          });
          linked = state.movimientos.find((m) => String(m.cobrar_id || '') === String(cobrarId) && String(m.id) !== String(opts.skipMovementId));
        }
      }

      const idx = state.cobrar.findIndex((x) => String(x.id) === String(cobrarId));
      if (idx >= 0) state.cobrar.splice(idx, 1);
    }

    function removeMovementInternal(movement, options = {}) {
      const opts = {
        keepArray: false,
        deleteLinkedCobrar: false,
        revertCobro: false,
        ...options
      };

      applyMovementEffect(movement, -1);

      if (opts.revertCobro && movement.cobro_id) {
        const c = cobrarById(movement.cobro_id);
        if (c) {
          c.estado = 'pendiente';
          c.movimiento_id = '';
          c.fecha_cobro = '';
        }
      }

      if (opts.deleteLinkedCobrar && normalizeMovementType(movement) === 'por_cobrar' && movement.cobrar_id) {
        deleteCobrarRecord(movement.cobrar_id, {
          removeIngresoMovement: true,
          removeRegistroMovement: false,
          skipMovementId: movement.id
        });
      }

      if (!opts.keepArray) {
        const idx = state.movimientos.findIndex((m) => String(m.id) === String(movement.id));
        if (idx >= 0) state.movimientos.splice(idx, 1);
      }
    }

    function upsertCobrarIngreso(cobro) {
      const isCobrado = String(cobro.estado || '').toLowerCase() === 'cobrado';
      const mIdx = state.movimientos.findIndex((m) => String(m.id) === String(cobro.movimiento_id));

      if (!isCobrado) {
        if (mIdx >= 0) {
          removeMovementInternal(state.movimientos[mIdx], {
            keepArray: false,
            deleteLinkedCobrar: false,
            revertCobro: false
          });
        }
        cobro.movimiento_id = '';
        cobro.fecha_cobro = '';
        return true;
      }

      if (!String(cobro.cuenta_id || '').trim()) return false;

      const movement = {
        id: mIdx >= 0 ? state.movimientos[mIdx].id : nextEntityId(state.movimientos),
        tipo: 'ingreso',
        fecha: normalizeDate(cobro.fecha_cobro || todayISO()),
        monto: Math.abs(toNumber(cobro.monto)),
        concepto: `Cobro ${cobro.deudor}`,
        categoria: 'Cobro deuda',
        notas: String(cobro.notas || ''),
        cuenta_id: String(cobro.cuenta_id || ''),
        cobro_id: String(cobro.id)
      };

      if (movement.monto <= 0) return false;

      if (mIdx >= 0) {
        removeMovementInternal(state.movimientos[mIdx], {
          keepArray: true,
          deleteLinkedCobrar: false,
          revertCobro: false
        });
        state.movimientos[mIdx] = movement;
      } else {
        state.movimientos.push(movement);
      }
      applyMovementEffect(movement, 1);
      cobro.movimiento_id = String(movement.id);
      cobro.fecha_cobro = movement.fecha;
      return true;
    }

    function movementToCsv(rows) {
      const head = ['id', 'fecha', 'tipo', 'concepto', 'categoria', 'cuenta', 'monto', 'notas'];
      const body = rows.map((m) => [
        m.id,
        normalizeDate(m.fecha),
        normalizeMovementType(m),
        m.concepto || '',
        m.categoria || '',
        accountName(m.cuenta_id),
        toNumber(m.monto),
        m.notas || ''
      ]);
      const esc = (v) => {
        const s = String(v ?? '');
        if (s.includes('"') || s.includes(',') || s.includes('\n')) return `"${s.replaceAll('"', '""')}"`;
        return s;
      };
      return [head, ...body].map((row) => row.map(esc).join(',')).join('\n');
    }

    function downloadText(filename, content, mime = 'text/plain;charset=utf-8') {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
